<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notebook</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23f5d5e0'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-size='20' fill='%23d4849a'%3E✦%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #d4849a;
  --accent-hover: #bf6f88;
  --bg:           #f9f9f9;
  --bg-card:      #fff;
  --text-dark:    #3d1a28;
  --text-plum:    #5c2d44;
  --text-muted:   #c084a0;
  --text-gray:    #999;
  --text-light:   #bbb;
  --border:       #e5e5e5;
  --border-light: #f0f0f0;
  --border-blush: #edccd6;
  --ring-bg:      #f5d5e0;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-plum);
  min-height: 100vh;
  padding: 0 0 60px;
}

/* ── Header ─────────────────────────────────────────── */
header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 38px 0 22px;
}
.app-title {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-dark);
  letter-spacing: -0.02em;
}
.app-title .glyph { color: var(--accent); }

/* ── Layout wrapper ─────────────────────────────────── */
.container {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ── Tab nav ─────────────────────────────────────────── */
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 28px;
}
.tab-btn {
  padding: 7px 18px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-gray);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
}
.tab-btn:hover { border-color: var(--border-blush); color: var(--text-plum); }
.tab-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── Panel ───────────────────────────────────────────── */
.panel { display: none; }
.panel.active { display: block; }

/* ── Input row ───────────────────────────────────────── */
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  align-items: center;
}
.text-input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text-plum);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  font-weight: 400;
  outline: none;
  transition: border-color 0.15s;
  text-transform: lowercase;
}
.text-input::placeholder { color: var(--text-light); }
.text-input:focus { border-color: var(--accent); }
.text-input.flash-error {
  border-color: var(--accent) !important;
  animation: flashBorder 0.4s ease;
}

@keyframes flashBorder {
  0%   { border-color: var(--accent); }
  50%  { border-color: #ff8fa0; }
  100% { border-color: var(--accent); }
}

.btn-primary {
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-add {
  padding: 0;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  font-size: 1.2rem;
  line-height: 1;
  flex-shrink: 0;
}

/* ── Section label ───────────────────────────────────── */
.day-label {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 20px 0 10px;
}
.day-label:first-child { margin-top: 0; }

/* ── Win card ────────────────────────────────────────── */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.win-card {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 14px;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 12px;
  margin-bottom: 7px;
  transition: border-color 0.15s;
  animation: slideIn 0.2s ease;
  position: relative;
}
.win-card:hover { border-color: var(--border-blush); }
.win-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 6px;
}
.win-body { flex: 1; min-width: 0; }
.win-note {
  font-size: 0.855rem;
  font-weight: 400;
  color: var(--text-plum);
  line-height: 1.4;
  word-break: break-word;
  text-transform: lowercase;
}
.win-time {
  font-size: 0.72rem;
  color: var(--text-light);
  flex-shrink: 0;
  margin-top: 3px;
  padding-top: 2px;
}
.btn-delete {
  background: none;
  border: none;
  color: var(--text-light);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 4px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
}
.win-card:hover .btn-delete,
.habit-row:hover .btn-delete,
.reminder-row:hover .btn-delete,
.activity-row:hover .btn-delete { opacity: 1; }
.btn-delete:hover { color: var(--accent-hover); }

/* ── Empty state ─────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 52px 0 32px;
  color: var(--text-muted);
}
.empty-glyph {
  font-size: 1.6rem;
  display: block;
  margin-bottom: 10px;
  opacity: 0.5;
}
.empty-text {
  font-size: 0.82rem;
  font-weight: 400;
  opacity: 0.7;
}

/* ── Habits tab ──────────────────────────────────────── */
.habits-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.habits-progress {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-gray);
}

.habit-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 12px;
  margin-bottom: 7px;
  transition: border-color 0.15s;
  animation: slideIn 0.2s ease;
  position: relative;
}
.habit-row:hover { border-color: var(--border-blush); }

.check-circle {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid var(--border-blush);
  background: var(--ring-bg);
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
}
.check-circle.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.check-circle.checked::after {
  content: '';
  width: 8px;
  height: 5px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translate(1px, -1px);
  display: block;
}
.check-circle:hover:not(.checked) { border-color: var(--accent); }

.habit-body { flex: 1; min-width: 0; }
.habit-name {
  font-size: 0.855rem;
  font-weight: 400;
  color: var(--text-plum);
  text-transform: lowercase;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.habit-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
}
.dot.filled { background: var(--accent); }
.dot.past { opacity: 0.5; }

.streak-badge {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-light);
  flex-shrink: 0;
  min-width: 24px;
  text-align: right;
}
.streak-badge.lit { color: var(--accent); }

/* ── Reminders tab ───────────────────────────────────── */
.reminder-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 12px;
  margin-bottom: 7px;
  transition: border-color 0.15s;
  animation: slideIn 0.2s ease;
}
.reminder-row:hover { border-color: var(--border-blush); }
.reminder-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}
.reminder-text {
  flex: 1;
  font-size: 0.855rem;
  font-weight: 400;
  color: var(--text-plum);
  text-transform: lowercase;
  word-break: break-word;
  line-height: 1.4;
}

/* ── Bored tab ───────────────────────────────────────── */
.bored-intro {
  text-align: center;
  padding: 40px 0 32px;
}
.bored-heading {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 18px;
}
.btn-im-bored {
  padding: 11px 32px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-im-bored:hover { background: var(--accent-hover); }

.activity-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border-blush);
  border-radius: 16px;
  padding: 22px 20px 16px;
  margin-bottom: 14px;
  animation: slideIn 0.2s ease;
}
.activity-text {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-dark);
  text-transform: lowercase;
  line-height: 1.45;
  margin-bottom: 16px;
}
.activity-actions {
  display: flex;
  gap: 8px;
}
.btn-complete {
  padding: 8px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-complete:hover { background: var(--accent-hover); }
.btn-reroll {
  padding: 8px 16px;
  background: none;
  color: var(--text-muted);
  border: 1.5px solid var(--border-blush);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-reroll:hover { border-color: var(--accent); color: var(--accent); }

.customize-toggle {
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  padding: 2px 0;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color 0.15s;
}
.customize-toggle:hover { color: var(--accent); }
.customize-toggle .arrow { display: inline-block; transition: transform 0.2s; }
.customize-toggle.open .arrow { transform: rotate(180deg); }

.customize-panel { display: none; }
.customize-panel.open { display: block; }

.activity-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 10px;
  margin-bottom: 6px;
  transition: border-color 0.15s;
}
.activity-row:hover { border-color: var(--border-blush); }
.activity-row-text {
  flex: 1;
  font-size: 0.83rem;
  color: var(--text-plum);
  text-transform: lowercase;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.btn-recurring {
  padding: 3px 10px;
  border-radius: 999px;
  border: 1.5px solid var(--border-blush);
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  color: var(--text-muted);
  flex-shrink: 0;
}
.btn-recurring.on {
  background: var(--ring-bg);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Time filters ────────────────────────────────────── */
.time-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 24px;
}
.time-pill {
  padding: 5px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--border-blush);
  background: var(--bg-card);
  color: var(--text-plum);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s ease;
}
.time-pill:hover { border-color: var(--accent); color: var(--accent); }
.time-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.duration-select {
  padding: 10px 8px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text-plum);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
  flex-shrink: 0;
}
.duration-select:focus { border-color: var(--accent); }

.activity-duration {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 500;
  margin-top: -10px;
  margin-bottom: 14px;
}
.duration-tag {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 500;
  flex-shrink: 0;
}

/* ── Auth area ───────────────────────────────────────── */
#auth-area {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
#sync-status {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 500;
}
.btn-google-sign-in {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-gray);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-google-sign-in:hover { border-color: var(--border-blush); color: var(--text-plum); }
#user-info {
  display: none;
  align-items: center;
  gap: 8px;
}
#user-name {
  font-size: 0.72rem;
  color: var(--text-gray);
  max-width: 150px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.btn-sign-out {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: none;
  color: var(--text-light);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-sign-out:hover { border-color: var(--border-blush); color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="app-title">notebook <span class="glyph">✦</span></span>
    <div id="auth-area">
      <span id="sync-status"></span>
      <button class="btn-google-sign-in" id="btn-sign-in">sign in with google</button>
      <div id="user-info">
        <span id="user-name"></span>
        <button class="btn-sign-out" id="btn-sign-out">sign out</button>
      </div>
    </div>
  </header>

  <!-- Tab nav -->
  <nav class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="wins" role="tab" aria-selected="true">wins</button>
    <button class="tab-btn" data-tab="habits" role="tab" aria-selected="false">habits</button>
    <button class="tab-btn" data-tab="reminders" role="tab" aria-selected="false">reminders</button>
    <button class="tab-btn" data-tab="bored" role="tab" aria-selected="false">bored?</button>
  </nav>

  <!-- ── WINS PANEL ── -->
  <section id="panel-wins" class="panel active" role="tabpanel">
    <div class="input-row">
      <input
        id="win-input"
        class="text-input"
        type="text"
        placeholder="what did you do today?"
        maxlength="120"
        autocomplete="off"
        autocorrect="off"
        spellcheck="true"
      >
      <button class="btn-primary" id="btn-log">log it</button>
    </div>
    <div id="wins-feed"></div>
  </section>

  <!-- ── HABITS PANEL ── -->
  <section id="panel-habits" class="panel" role="tabpanel">
    <div class="input-row">
      <input
        id="habit-input"
        class="text-input"
        type="text"
        placeholder="new habit name"
        maxlength="80"
        autocomplete="off"
        autocorrect="off"
      >
      <button class="btn-primary btn-add" id="btn-add-habit" title="add habit">+</button>
    </div>
    <div class="habits-header">
      <span class="day-label" style="margin:0">today</span>
      <span class="habits-progress" id="habits-progress"></span>
    </div>
    <div id="habits-list"></div>
  </section>

  <!-- ── REMINDERS PANEL ── -->
  <section id="panel-reminders" class="panel" role="tabpanel">
    <div class="input-row">
      <input
        id="reminder-input"
        class="text-input"
        type="text"
        placeholder="e.g. review your notes every evening"
        maxlength="120"
        autocomplete="off"
        autocorrect="off"
      >
      <button class="btn-primary btn-add" id="btn-add-reminder" title="add reminder">+</button>
    </div>
    <div id="reminders-list"></div>
  </section>

  <!-- ── BORED PANEL ── -->
  <section id="panel-bored" class="panel" role="tabpanel">
    <div class="time-filters" id="time-filters">
      <button class="time-pill active" data-dur="">any time</button>
      <button class="time-pill" data-dur="5">5 min</button>
      <button class="time-pill" data-dur="15">15 min</button>
      <button class="time-pill" data-dur="30">30 min</button>
      <button class="time-pill" data-dur="60">1 hr</button>
    </div>
    <div id="bored-main"></div>
    <button class="customize-toggle" id="btn-customize-toggle">
      customize <span class="arrow">↓</span>
    </button>
    <div class="customize-panel" id="customize-panel">
      <div class="input-row">
        <input
          id="activity-input"
          class="text-input"
          type="text"
          placeholder="add an activity"
          maxlength="100"
          autocomplete="off"
          autocorrect="off"
        >
        <select id="activity-duration" class="duration-select">
          <option value="">no time</option>
          <option value="5">5 min</option>
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="60">1 hr</option>
        </select>
        <button class="btn-primary btn-add" id="btn-add-activity" title="add">+</button>
      </div>
      <div id="activity-list"></div>
    </div>
  </section>
</div>

<script>
// ── Utility ─────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isoFromEpoch(ms) {
  const d = new Date(ms);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatTime(ms) {
  const d = new Date(ms);
  let h = d.getHours(), m = d.getMinutes(), ampm = 'am';
  if (h >= 12) { ampm = 'pm'; if (h > 12) h -= 12; }
  if (h === 0) h = 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

function dayLabel(iso) {
  const today = todayISO();
  const d = new Date(iso + 'T00:00:00');
  const yest = new Date(d);
  const todayDate = new Date(today + 'T00:00:00');
  const diff = Math.round((todayDate - d) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'yesterday';
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}

// ── Storage ──────────────────────────────────────────────────────────────
function loadWins() {

// ── Google Auth & Drive Sync ─────────────────────────────────────────────
const GIS_CLIENT_ID = '708733339406-5clkirf9o0g9nk4lolmrdnrml6rledrf.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILE_NAME = 'notebook_data.json';

let accessToken = null;
let driveFileId = null;
let syncTimer = null;
let tokenClient = null;

function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GIS_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: handleTokenResponse,
  });
  // Silent sign-in if previously authenticated
  if (localStorage.getItem('nb_google_signin')) {
    tokenClient.requestAccessToken({ prompt: '' });
  }
}

async function handleTokenResponse(resp) {
  if (resp.error) {
    localStorage.removeItem('nb_google_signin');
    updateAuthUI(false);
    return;
  }
  accessToken = resp.access_token;
  localStorage.setItem('nb_google_signin', '1');
  // Fetch user info for display
  try {
    const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${accessToken}` }
    }).then(r => r.json());
    document.getElementById('user-name').textContent = info.email || info.name || '';
  } catch {}
  updateAuthUI(true);
  await loadFromDrive();
}

function updateAuthUI(signedIn) {
  document.getElementById('btn-sign-in').style.display = signedIn ? 'none' : '';
  document.getElementById('user-info').style.display = signedIn ? 'flex' : 'none';
}

function setSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) el.textContent = msg;
}

// Drive helpers
async function driveRequest(url, opts = {}) {
  const res = await fetch(url, {
    ...opts,
    headers: { Authorization: `Bearer ${accessToken}`, ...(opts.headers || {}) }
  });
  if (res.status === 401) {
    // Token expired — request new one silently
    tokenClient.requestAccessToken({ prompt: '' });
    throw new Error('token_expired');
  }
  return res;
}

async function driveFindFile() {
  const res = await driveRequest(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27${DRIVE_FILE_NAME}%27&fields=files(id)`
  );
  const data = await res.json();
  return data.files?.[0]?.id || null;
}

async function driveReadFile(fileId) {
  const res = await driveRequest(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`
  );
  return await res.json();
}

async function driveWriteFile(content) {
  const body = JSON.stringify(content);
  if (!driveFileId) {
    // Create new appDataFolder file via multipart upload
    const boundary = 'nb_mp_boundary';
    const meta = JSON.stringify({ name: DRIVE_FILE_NAME, parents: ['appDataFolder'] });
    const mp = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
    const res = await driveRequest(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      { method: 'POST', headers: { 'Content-Type': `multipart/related; boundary=${boundary}` }, body: mp }
    );
    const data = await res.json();
    driveFileId = data.id;
  } else {
    await driveRequest(
      `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,
      { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body }
    );
  }
}

async function loadFromDrive() {
  setSyncStatus('syncing...');
  try {
    driveFileId = await driveFindFile();
    if (driveFileId) {
      // Drive data wins — load it into state and localStorage
      const data = await driveReadFile(driveFileId);
      if (Array.isArray(data.wins))       { wins = data.wins;        saveWinsLocal(wins); }
      if (Array.isArray(data.habits))     { habits = data.habits;    saveHabitsLocal(habits); }
      if (Array.isArray(data.reminders))  { reminders = data.reminders; saveRemindersLocal(reminders); }
      if (Array.isArray(data.activities)) { activities = data.activities; saveActivitiesLocal(activities); }
      renderWins(); renderHabits(); renderReminders(); renderBored(); renderActivityList();
    } else {
      // First sign-in: push existing local data up to Drive
      await driveWriteFile({ wins, habits, reminders, activities });
    }
    setSyncStatus('✓ synced');
    setTimeout(() => setSyncStatus(''), 2500);
  } catch (e) {
    if (e.message !== 'token_expired') {
      console.error('Drive sync error:', e);
      setSyncStatus('sync error');
    }
  }
}

function scheduleDriveSync() {
  if (!accessToken) return;
  setSyncStatus('saving...');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    try {
      await driveWriteFile({ wins, habits, reminders, activities });
      setSyncStatus('✓ saved');
      setTimeout(() => setSyncStatus(''), 2500);
    } catch (e) {
      if (e.message !== 'token_expired') {
        console.error('Drive sync error:', e);
        setSyncStatus('sync error');
      }
    }
  }, 1500);
}

// ── Wins feed ────────────────────────────────────────────────────────────
function renderWins() {
  const feed = document.getElementById('wins-feed');
  if (wins.length === 0) {
    feed.innerHTML = `<div class="empty-state">
      <span class="empty-glyph">✦</span>
      <span class="empty-text">no wins logged yet — start small</span>
    </div>`;
    return;
  }

  // Group by ISO date
  const groups = {};
  wins.forEach(w => {
    const iso = isoFromEpoch(w.ts);
    if (!groups[iso]) groups[iso] = [];
    groups[iso].push(w);
  });

  // Sort dates newest first
  const dates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  feed.innerHTML = '';
  dates.forEach(iso => {
    const label = document.createElement('div');
    label.className = 'day-label';
    label.textContent = dayLabel(iso);
    feed.appendChild(label);

    // Sort wins newest first within day
    groups[iso].sort((a, b) => b.ts - a.ts).forEach(w => {
      const card = document.createElement('div');
      card.className = 'win-card';
      card.dataset.id = w.id;

      card.innerHTML = `
        <div class="win-pip"></div>
        <div class="win-body"><div class="win-note">${escHtml(w.note)}</div></div>
        <span class="win-time">${formatTime(w.ts)}</span>
        <button class="btn-delete" title="delete" data-id="${escHtml(w.id)}">×</button>
      `;
      feed.appendChild(card);
    });
  });

  // Delete buttons
  feed.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      wins = wins.filter(w => w.id !== id);
      saveWins(wins);
      renderWins();
    });
  });
}

// ── Log a win ────────────────────────────────────────────────────────────
function logWin() {
  const input = document.getElementById('win-input');
  const note = input.value.trim().toLowerCase();

  if (!note) {
    input.classList.add('flash-error');
    input.focus();
    setTimeout(() => input.classList.remove('flash-error'), 500);
    return;
  }

  wins.unshift({ id: uid(), note, ts: Date.now() });
  saveWins(wins);
  input.value = '';
  renderWins();
}

// ── Habit helpers ────────────────────────────────────────────────────────
function getStreak(habit) {
  const today = todayISO();
  const completions = new Set(habit.completions);

  // If today is done, count from today
  // If today is not done, count from yesterday (preserve streak)
  let cursor;
  if (completions.has(today)) {
    cursor = new Date(today + 'T00:00:00');
  } else {
    const yest = new Date(today + 'T00:00:00');
    yest.setDate(yest.getDate() - 1);
    const yestISO = isoFromEpoch(yest.getTime());
    if (!completions.has(yestISO)) return 0;
    cursor = yest;
  }

  let streak = 0;
  while (true) {
    const iso = isoFromEpoch(cursor.getTime());
    if (!completions.has(iso)) break;
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}

function getLast7Days() {
  const days = [];
  const today = new Date(todayISO() + 'T00:00:00');
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days.push(isoFromEpoch(d.getTime()));
  }
  return days; // oldest → newest (index 6 = today)
}

// ── Render habits ────────────────────────────────────────────────────────
function renderHabits() {
  const list = document.getElementById('habits-list');
  const progress = document.getElementById('habits-progress');
  const today = todayISO();

  if (habits.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="empty-glyph">◦</span>
      <span class="empty-text">add a habit to start tracking</span>
    </div>`;
    progress.textContent = '';
    return;
  }

  const doneCount = habits.filter(h => h.completions.includes(today)).length;
  progress.textContent = `${doneCount} / ${habits.length}`;

  const last7 = getLast7Days();

  list.innerHTML = '';
  habits.forEach(habit => {
    const isChecked = habit.completions.includes(today);
    const streak = getStreak(habit);
    const row = document.createElement('div');
    row.className = 'habit-row';
    row.dataset.id = habit.id;

    const dotsHTML = last7.map((iso, i) => {
      const filled = habit.completions.includes(iso);
      const isToday = (i === 6);
      let cls = 'dot';
      if (filled) cls += ' filled';
      if (!isToday) cls += ' past';
      return `<span class="${cls}"></span>`;
    }).join('');

    const streakLit = streak >= 2 ? ' lit' : '';

    row.innerHTML = `
      <div class="check-circle${isChecked ? ' checked' : ''}" data-id="${escHtml(habit.id)}"></div>
      <div class="habit-body">
        <div class="habit-name">${escHtml(habit.name)}</div>
        <div class="habit-dots">${dotsHTML}</div>
      </div>
      <span class="streak-badge${streakLit}">${streak >= 1 ? streak + 'd' : ''}</span>
      <button class="btn-delete" title="delete" data-id="${escHtml(habit.id)}">×</button>
    `;
    list.appendChild(row);
  });

  // Toggle check
  list.querySelectorAll('.check-circle').forEach(circle => {
    circle.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      const habit = habits.find(h => h.id === id);
      if (!habit) return;
      if (habit.completions.includes(today)) {
        habit.completions = habit.completions.filter(d => d !== today);
      } else {
        habit.completions.push(today);
      }
      saveHabits(habits);
      renderHabits();
    });
  });

  // Delete habit
  list.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      habits = habits.filter(h => h.id !== id);
      saveHabits(habits);
      renderHabits();
    });
  });
}

// ── Add habit ────────────────────────────────────────────────────────────
function addHabit() {
  const input = document.getElementById('habit-input');
  const name = input.value.trim().toLowerCase();
  if (!name) return;

  // Duplicate check
  if (habits.some(h => h.name === name)) {
    input.classList.add('flash-error');
    setTimeout(() => input.classList.remove('flash-error'), 500);
    return;
  }

  const habit = {
    id: uid(),
    name,
    completions: [],
    createdAt: Date.now()
  };
  habits.push(habit);
  saveHabits(habits);
  input.value = '';
  renderHabits();
}

// ── Bored tab ────────────────────────────────────────────────────────────
function fmtDur(d) { return d === 60 ? '1 hr' : d + ' min'; }
function fmtDurShort(d) { return d === 60 ? '1h' : d + 'm'; }

function getAvailable() {
  return activities.filter(a => {
    if (!a.recurring && a.completed) return false;
    if (selectedDuration === null) return true;
    return a.duration != null && a.duration <= selectedDuration;
  });
}

function renderBored() {
  const main = document.getElementById('bored-main');

  // Validate current activity still available
  if (currentActivityId) {
    const a = activities.find(a => a.id === currentActivityId);
    if (!a || (!a.recurring && a.completed)) currentActivityId = null;
  }

  if (!currentActivityId) {
    const pool = getAvailable();
    if (pool.length === 0) {
      const msg = selectedDuration !== null
        ? `no activities within ${fmtDur(selectedDuration)} — try a different filter`
        : 'no activities left — add more in customize';
      main.innerHTML = `<div class="empty-state">
        <span class="empty-glyph">◌</span>
        <span class="empty-text">${msg}</span>
      </div>`;
    } else {
      main.innerHTML = `<div class="bored-intro">
        <div class="bored-heading">bored?</div>
        <button class="btn-im-bored" id="btn-im-bored">i'm bored</button>
      </div>`;
      document.getElementById('btn-im-bored').addEventListener('click', () => {
        const pool = getAvailable();
        currentActivityId = pool[Math.floor(Math.random() * pool.length)].id;
        renderBored();
      });
    }
    return;
  }

  const activity = activities.find(a => a.id === currentActivityId);
  if (!activity) { currentActivityId = null; renderBored(); return; }

  const durHTML = activity.duration != null
    ? `<div class="activity-duration">${fmtDur(activity.duration)}</div>` : '';

  main.innerHTML = `
    <div class="activity-card">
      <div class="activity-text">${escHtml(activity.text)}</div>
      ${durHTML}
      <div class="activity-actions">
        <button class="btn-complete" id="btn-complete">complete ✓</button>
        <button class="btn-reroll" id="btn-reroll">reroll</button>
      </div>
    </div>
  `;

  document.getElementById('btn-complete').addEventListener('click', () => {
    if (!activity.recurring) {
      activities = activities.filter(a => a.id !== currentActivityId);
      saveActivities(activities);
    }
    currentActivityId = null;
    renderBored();
    renderActivityList();
  });

  document.getElementById('btn-reroll').addEventListener('click', () => {
    const pool = getAvailable().filter(a => a.id !== currentActivityId);
    if (!pool.length) return;
    currentActivityId = pool[Math.floor(Math.random() * pool.length)].id;
    renderBored();
  });
}

function renderActivityList() {
  const list = document.getElementById('activity-list');
  if (!list) return;
  if (activities.length === 0) {
    list.innerHTML = `<div class="empty-state" style="padding:24px 0 12px">
      <span class="empty-text">no activities yet</span>
    </div>`;
    return;
  }
  list.innerHTML = '';
  activities.forEach(a => {
    const row = document.createElement('div');
    row.className = 'activity-row';
    const durTag = a.duration != null
      ? `<span class="duration-tag">${fmtDurShort(a.duration)}</span>` : '';
    row.innerHTML = `
      <div class="activity-row-text">${escHtml(a.text)}</div>
      ${durTag}
      <button class="btn-recurring${a.recurring ? ' on' : ''}" data-id="${escHtml(a.id)}">${a.recurring ? 'recurring' : 'one-time'}</button>
      <button class="btn-delete" title="delete" data-id="${escHtml(a.id)}">×</button>
    `;
    list.appendChild(row);
  });

  list.querySelectorAll('.btn-recurring').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      const idx = activities.findIndex(a => a.id === id);
      if (idx === -1) return;
      activities[idx].recurring = !activities[idx].recurring;
      if (activities[idx].recurring) activities[idx].completed = false;
      saveActivities(activities);
      renderActivityList();
      renderBored();
    });
  });

  list.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      if (currentActivityId === id) currentActivityId = null;
      activities = activities.filter(a => a.id !== id);
      saveActivities(activities);
      renderBored();
      renderActivityList();
    });
  });
}

function addActivity() {
  const input = document.getElementById('activity-input');
  const durSelect = document.getElementById('activity-duration');
  const text = input.value.trim().toLowerCase();
  const duration = durSelect.value ? parseInt(durSelect.value) : null;
  if (!text) return;
  if (activities.some(a => a.text === text)) {
    input.classList.add('flash-error');
    setTimeout(() => input.classList.remove('flash-error'), 500);
    return;
  }
  activities.push({ id: uid(), text, recurring: true, completed: false, duration });
  saveActivities(activities);
  input.value = '';
  durSelect.value = '';
  renderActivityList();
  renderBored();
}
