}

// ── Habit helpers ────────────────────────────────────────────────────────
function getStreak(habit) {
  const today = todayISO();
  const completions = new Set(habit.completions);

  // If today is done, count from today
  // If today is not done, count from yesterday (preserve streak)
  let cursor;
  if (completions.has(today)) {
    cursor = new Date(today + 'T00:00:00');
  } else {
    const yest = new Date(today + 'T00:00:00');
    yest.setDate(yest.getDate() - 1);
    const yestISO = isoFromEpoch(yest.getTime());
    if (!completions.has(yestISO)) return 0;
    cursor = yest;
  }

  let streak = 0;
  while (true) {
    const iso = isoFromEpoch(cursor.getTime());
    if (!completions.has(iso)) break;
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}

function getLast7Days() {
  const days = [];
  const today = new Date(todayISO() + 'T00:00:00');
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days.push(isoFromEpoch(d.getTime()));
  }
  return days; // oldest → newest (index 6 = today)
}

// ── Render habits ────────────────────────────────────────────────────────
function renderHabits() {
  const list = document.getElementById('habits-list');
  const progress = document.getElementById('habits-progress');
  const today = todayISO();

  if (habits.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="empty-glyph">◦</span>
      <span class="empty-text">add a habit to start tracking</span>
    </div>`;
    progress.textContent = '';
    return;
  }

  const doneCount = habits.filter(h => h.completions.includes(today)).length;
  progress.textContent = `${doneCount} / ${habits.length}`;

  const last7 = getLast7Days();

  list.innerHTML = '';
  habits.forEach(habit => {
    const isChecked = habit.completions.includes(today);
    const streak = getStreak(habit);
    const row = document.createElement('div');
    row.className = 'habit-row';
    row.dataset.id = habit.id;

    const dotsHTML = last7.map((iso, i) => {
      const filled = habit.completions.includes(iso);
      const isToday = (i === 6);
      let cls = 'dot';
      if (filled) cls += ' filled';
      if (!isToday) cls += ' past';
      return `<span class="${cls}"></span>`;
    }).join('');

    const streakLit = streak >= 2 ? ' lit' : '';

    row.innerHTML = `
      <div class="check-circle${isChecked ? ' checked' : ''}" data-id="${escHtml(habit.id)}"></div>
      <div class="habit-body">
        <div class="habit-name">${escHtml(habit.name)}</div>
        <div class="habit-dots">${dotsHTML}</div>
      </div>
      <span class="streak-badge${streakLit}">${streak >= 1 ? streak + 'd' : ''}</span>
      <button class="btn-delete" title="delete" data-id="${escHtml(habit.id)}">×</button>
    `;
    list.appendChild(row);
  });

  // Toggle check
  list.querySelectorAll('.check-circle').forEach(circle => {
    circle.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      const habit = habits.find(h => h.id === id);
      if (!habit) return;
      if (habit.completions.includes(today)) {
        habit.completions = habit.completions.filter(d => d !== today);
      } else {
        habit.completions.push(today);
      }
      saveHabits(habits);
      renderHabits();
    });
  });

  // Delete habit
  list.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      habits = habits.filter(h => h.id !== id);
      saveHabits(habits);
      renderHabits();
    });
  });
}

// ── Add habit ────────────────────────────────────────────────────────────
function addHabit() {
  const input = document.getElementById('habit-input');
  const name = input.value.trim().toLowerCase();
  if (!name) return;

  // Duplicate check
  if (habits.some(h => h.name === name)) {
    input.classList.add('flash-error');
    setTimeout(() => input.classList.remove('flash-error'), 500);
    return;
  }

  const habit = {
    id: uid(),
    name,
    completions: [],
    createdAt: Date.now()
  };
  habits.push(habit);
  saveHabits(habits);
  input.value = '';
  renderHabits();
}

// ── Render reminders ─────────────────────────────────────────────────────
function renderReminders() {
  const list = document.getElementById('reminders-list');
  if (reminders.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="empty-glyph">◌</span>
      <span class="empty-text">no reminders yet — add something to come back to</span>
    </div>`;
    return;
  }
  list.innerHTML = '';
  reminders.forEach(r => {
    const row = document.createElement('div');
    row.className = 'reminder-row';
    row.innerHTML = `
      <div class="reminder-pip"></div>
      <div class="reminder-text">${escHtml(r.text)}</div>
      <button class="btn-delete" title="delete" data-id="${escHtml(r.id)}">×</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      reminders = reminders.filter(r => r.id !== id);
      saveReminders(reminders);
      renderReminders();
    });
  });
}

// ── Add reminder ──────────────────────────────────────────────────────────
function addReminder() {
  const input = document.getElementById('reminder-input');
  const text = input.value.trim().toLowerCase();
  if (!text) return;
  if (reminders.some(r => r.text === text)) {
    input.classList.add('flash-error');
    setTimeout(() => input.classList.remove('flash-error'), 500);
    return;
  }
  reminders.push({ id: uid(), text, createdAt: Date.now() });
  saveReminders(reminders);
  input.value = '';
  renderReminders();
}

// ── Bored tab ────────────────────────────────────────────────────────────
function fmtDur(d) { return d === 60 ? '1 hr' : d + ' min'; }
function fmtDurShort(d) { return d === 60 ? '1h' : d + 'm'; }

function fmtPlanDur(mins) {
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? `${h}h${m}m` : `${h}h`;
}
function getPlanDuration() {
  const sel = document.getElementById('plan-duration');
  if (!sel || sel.value === 'custom') {
    const v = parseInt((document.getElementById('plan-custom-dur') || {}).value);
    return v > 0 ? v : 30;
  }
  return parseInt(sel.value) || 30;
}
function fmt12h(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  const ampm = h >= 12 ? 'pm' : 'am';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}
function fmtHourLabel(h) {
  if (h === 0 || h === 24) return 'midnight';
  if (h === 12) return 'noon';
  return `${h > 12 ? h - 12 : h} ${h >= 12 ? 'pm' : 'am'}`;
}

function getAvailable() {
  return activities.filter(a => {
    if (!a.recurring && a.completed) return false;
    if (selectedDuration === null) return true;
    return a.duration != null && a.duration === selectedDuration;
  });
}

function renderBored() {
  const main = document.getElementById('bored-main');

  // Validate current activity still available
  if (currentActivityId) {
    const a = activities.find(a => a.id === currentActivityId);
    if (!a || (!a.recurring && a.completed)) currentActivityId = null;
  }

  if (!currentActivityId) {
    const pool = getAvailable();
    if (pool.length === 0) {
      const msg = selectedDuration !== null
        ? `no activities within ${fmtDur(selectedDuration)} — try a different filter`
        : 'no activities left — add more in customize';
      main.innerHTML = `<div class="empty-state">
        <span class="empty-glyph">◌</span>
        <span class="empty-text">${msg}</span>
      </div>`;
    } else {
      main.innerHTML = `<div class="bored-intro">
        <div class="bored-heading">bored?</div>
        <button class="btn-im-bored" id="btn-im-bored">i'm bored</button>
      </div>`;
      document.getElementById('btn-im-bored').addEventListener('click', () => {
        const pool = getAvailable();
        currentActivityId = pool[Math.floor(Math.random() * pool.length)].id;
        renderBored();
      });
    }
    return;
  }

  const activity = activities.find(a => a.id === currentActivityId);
  if (!activity) { currentActivityId = null; renderBored(); return; }

  const durHTML = activity.duration != null
    ? `<div class="activity-duration">${fmtDur(activity.duration)}</div>` : '';

  main.innerHTML = `
    <div class="activity-card">
      <div class="activity-text">${escHtml(activity.text)}</div>
      ${durHTML}
      <div class="activity-actions">
        <button class="btn-complete" id="btn-complete">complete ✓</button>
        <button class="btn-reroll" id="btn-reroll">reroll</button>
      </div>
    </div>
  `;

  document.getElementById('btn-complete').addEventListener('click', () => {
    if (!activity.recurring) {
      activities = activities.filter(a => a.id !== currentActivityId);
      saveActivities(activities);
    }
    currentActivityId = null;
    renderBored();
    renderActivityList();
  });

  document.getElementById('btn-reroll').addEventListener('click', () => {
    const pool = getAvailable().filter(a => a.id !== currentActivityId);
    if (!pool.length) return;
    currentActivityId = pool[Math.floor(Math.random() * pool.length)].id;
    renderBored();
  });
}

function renderActivityList() {
  const list = document.getElementById('activity-list');
  if (!list) return;
  if (activities.length === 0) {
    list.innerHTML = `<div class="empty-state" style="padding:24px 0 12px">
      <span class="empty-text">no activities yet</span>
    </div>`;
    return;
  }
  list.innerHTML = '';
  activities.forEach(a => {
    const row = document.createElement('div');
    row.className = 'activity-row';
    const durTag = a.duration != null
      ? `<span class="duration-tag" data-id="${escHtml(a.id)}">${fmtDurShort(a.duration)}</span>` : '';
    row.innerHTML = `
      <div class="activity-row-text">${escHtml(a.text)}</div>
      ${durTag}
      <button class="btn-recurring${a.recurring ? ' on' : ''}" data-id="${escHtml(a.id)}">${a.recurring ? 'recurring' : 'one-time'}</button>
      <button class="btn-edit" title="edit" data-id="${escHtml(a.id)}">✎</button>
      <button class="btn-delete" title="delete" data-id="${escHtml(a.id)}">×</button>
    `;
    list.appendChild(row);
  });

  list.querySelectorAll('.duration-tag').forEach(tag => {
    tag.addEventListener('click', e => {
      e.stopPropagation();
      const id = tag.dataset.id;
      const a = activities.find(x => x.id === id);
      if (!a) return;
      const sel = document.createElement('select');
      sel.className = 'dur-inline-select';
      [['','–'],['5','5m'],['15','15m'],['30','30m'],['60','1h']].forEach(([v, lbl]) => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = lbl;
        if (String(a.duration) === v || (v === '' && a.duration == null)) opt.selected = true;
        sel.appendChild(opt);
      });
      tag.replaceWith(sel);
      sel.focus();
      let saved = false;
      function save() {
        if (saved) return; saved = true;
        a.duration = sel.value ? parseInt(sel.value) : null;
        saveActivities(activities);
        renderBored();
        renderActivityList();
      }
      sel.addEventListener('change', save);
      sel.addEventListener('blur', save);
    });
  });

  list.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      const idx = activities.findIndex(a => a.id === id);
      if (idx === -1) return;
      const row = e.currentTarget.closest('.activity-row');
      const textEl = row.querySelector('.activity-row-text');
      const currentText = activities[idx].text;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = currentText;
      input.className = 'activity-row-input';
      input.maxLength = 100;
      textEl.replaceWith(input);
      input.focus();
      input.select();
      let saved = false;
      function save() {
        if (saved) return;
        saved = true;
        const newText = input.value.trim().toLowerCase();
        if (newText && newText !== currentText) {
          activities[idx].text = newText;
          saveActivities(activities);
          renderBored();
        }
        renderActivityList();
      }
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') save();
        if (e.key === 'Escape') { saved = true; renderActivityList(); }
      });
      input.addEventListener('blur', save);
    });
  });

  list.querySelectorAll('.btn-recurring').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      const idx = activities.findIndex(a => a.id === id);
      if (idx === -1) return;
      activities[idx].recurring = !activities[idx].recurring;
      if (activities[idx].recurring) activities[idx].completed = false;
      saveActivities(activities);
      renderActivityList();
      renderBored();
    });
  });

  list.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      if (currentActivityId === id) currentActivityId = null;
      activities = activities.filter(a => a.id !== id);
      saveActivities(activities);
      renderBored();
      renderActivityList();
    });
  });
}

function addActivity() {
  const input = document.getElementById('activity-input');
  const durSelect = document.getElementById('activity-duration');
  const text = input.value.trim().toLowerCase();
  const duration = durSelect.value ? parseInt(durSelect.value) : null;
  if (!text) return;
  if (activities.some(a => a.text === text)) {
    input.classList.add('flash-error');
    setTimeout(() => input.classList.remove('flash-error'), 500);
    return;
  }
  activities.push({ id: uid(), text, recurring: true, completed: false, duration });
  saveActivities(activities);
  input.value = '';
  durSelect.value = '';
  renderActivityList();
  renderBored();
}

// ── Planner tab ───────────────────────────────────────────────────────────
function todaysTasks() {
  const today = todayISO();
  return planner.filter(t => t.date === today || (t.date < today && !t.done));
}

function addPlanTask() {
  const input = document.getElementById('plan-input');
  const text = input.value.trim().toLowerCase();
  if (!text) {
    input.classList.add('flash-error');
    input.focus();
    setTimeout(() => input.classList.remove('flash-error'), 500);
    return;
  }
  planner.push({
    id: uid(),
    text,
    duration: getPlanDuration(),
    scheduledTime: null,
    done: false,
    date: todayISO(),
    createdAt: Date.now()
  });
  savePlanner(planner);
  input.value = '';
  renderPlanner();
}

function togglePlanTask(id) {
  const task = planner.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  savePlanner(planner);
  renderPlanner();
}

function deletePlanTask(id) {
  planner = planner.filter(t => t.id !== id);
  savePlanner(planner);
  renderPlanner();
}

function startEditPlanTask(id, rowEl) {
  const task = planner.find(t => t.id === id);
  if (!task) return;
  const textEl = rowEl.querySelector('.plan-task-text');
  const currentText = task.text;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = currentText;
  input.className = 'activity-row-input';
  input.maxLength = 120;
  textEl.replaceWith(input);
  input.focus();
  input.select();
  let saved = false;
  function save() {
    if (saved) return;
    saved = true;
    const newText = input.value.trim().toLowerCase();
    if (newText && newText !== currentText) {
      task.text = newText;
      savePlanner(planner);
    }
    renderPlanner();
  }
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') save();
    if (ev.key === 'Escape') { saved = true; renderPlanner(); }
  });
  input.addEventListener('blur', save);
}

function unscheduleTask(id) {
  const task = planner.find(t => t.id === id);
  if (!task) return;
  task.scheduledTime = null;
  savePlanner(planner);
  renderPlanner();
}

function onTaskDragStart(e, id) {
  dragTaskId = id;
  e.dataTransfer.setData('text/plain', id);
  requestAnimationFrame(() => {
    document.querySelectorAll('.plan-task-row').forEach(el => {
      if (el.dataset.id === id) el.classList.add('dragging');
    });
  });
}

function onTaskDragEnd() {
  document.querySelectorAll('.plan-task-row.dragging').forEach(el => el.classList.remove('dragging'));
  dragTaskId = null;
  document.querySelectorAll('.tl-slot.drag-over,.tl-slot.blocked')
    .forEach(el => el.classList.remove('drag-over', 'blocked'));
}

function onSlotDragOver(e, slotEl) {
  e.preventDefault();
  slotEl.classList.add('drag-over');
}

function onSlotDragLeave(e, slotEl) {
  if (!slotEl.contains(e.relatedTarget)) slotEl.classList.remove('drag-over');
}

function onSlotDrop(e, slotEl) {
  e.preventDefault();
  slotEl.classList.remove('drag-over');
  const id = dragTaskId || e.dataTransfer.getData('text/plain');
  if (!id) return;
  const task = planner.find(t => t.id === id);
  if (!task || task.done) return;
  const time = slotEl.dataset.time;
  const existing = planner.find(t => t.scheduledTime === time && t.id !== id && !t.done);
  if (existing) existing.scheduledTime = null;
  task.scheduledTime = time;
  task.date = todayISO(); // promote carryover tasks to today so renderPlanner won't clear their time
  savePlanner(planner);
  renderPlanner();
}

function generateTimeSlots(startH, endH) {
  const slots = [];
  for (let h = startH; h < endH; h++) {
    slots.push({ h, m: 0,  time: `${String(h).padStart(2,'0')}:00` });
    slots.push({ h, m: 15, time: `${String(h).padStart(2,'0')}:15` });
    slots.push({ h, m: 30, time: `${String(h).padStart(2,'0')}:30` });
    slots.push({ h, m: 45, time: `${String(h).padStart(2,'0')}:45` });
  }
  return slots;
}

function getTodayRecurring() {
  const dow = new Date().getDay();
  return planSettings.recurring.filter(r => Array.isArray(r.days) && r.days.includes(dow));
}

function snapTo15(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  const snapped = Math.round(m / 15) * 15;
  if (snapped >= 60) return `${String((h + 1) % 24).padStart(2,'0')}:00`;
  return `${String(h).padStart(2,'0')}:${String(snapped).padStart(2,'0')}`;
}
function timeToMins(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}
function minsToTime(mins) {
  return `${String(Math.floor(mins / 60)).padStart(2, '0')}:${String(mins % 60).padStart(2, '0')}`;
}

function renderTimeline(tasks) {
  const scheduled = {};
  // Done tasks fill slots first; non-done tasks override them if at the same time
  tasks.filter(t => t.scheduledTime).forEach(t => {
    if (!scheduled[t.scheduledTime] || !t.done) scheduled[t.scheduledTime] = t;
  });
  const recurring = getTodayRecurring();
  const { dayStart, dayEnd } = planSettings;
  const slots = generateTimeSlots(dayStart, dayEnd);
  const grid = document.getElementById('plan-timeline');
  if (!grid) return;

  grid.innerHTML = '';
  grid.style.gridTemplateRows = `repeat(${slots.length}, 18px)`;

  // Snap recurring events to 15-min grid
  const recurByTime = {};
  recurring.forEach(r => {
    if (!r.startTime) return;
    const snapped = snapTo15(r.startTime);
    if (slots.some(s => s.time === snapped)) recurByTime[snapped] = r;
  });

  // Check if dragged task's full span starting at `time` overlaps any existing task
  function slotConflict(time) {
    const dragTask = planner.find(t => t.id === dragTaskId);
    const dragDur = dragTask?.duration || 15;
    const dragStart = timeToMins(time);
    const dragEnd = dragStart + dragDur;
    return planner.some(t => {
      if (t.done || t.id === dragTaskId || !t.scheduledTime) return false;
      const tStart = timeToMins(t.scheduledTime);
      const tEnd = tStart + (t.duration || 15);
      return dragStart < tEnd && dragEnd > tStart;
    });
  }
  function clearSlotClasses() {
    grid.querySelectorAll('.tl-slot.drag-over,.tl-slot.blocked')
      .forEach(el => el.classList.remove('drag-over', 'blocked'));
  }
  // Highlight the full span of the dragged task across all slots it would occupy
  function highlightDragSlots(startTime) {
    clearSlotClasses();
    if (!dragTaskId) return;
    const dragTask = planner.find(t => t.id === dragTaskId);
    const dragSpan = Math.max(1, Math.round((dragTask?.duration || 15) / 15));
    const conflict = slotConflict(startTime);
    const cls = conflict ? 'blocked' : 'drag-over';
    const startIdx = slots.findIndex(s => s.time === startTime);
    if (startIdx === -1) return;
    for (let k = startIdx; k < Math.min(startIdx + dragSpan, slots.length); k++) {
      const el = grid.querySelector(`.tl-slot[data-time="${slots[k].time}"]`);
      if (el) el.classList.add(cls);
    }
  }

  // Labels + drop zones
  slots.forEach((slot, i) => {
    const isLast = i === slots.length - 1;
    const isHour = slot.m === 0;
    const isHalfHour = slot.m === 30;
    const lbl = document.createElement('div');
    lbl.className = `tl-label${isHour ? '' : ' half'}`;
    lbl.style.gridRow = i + 1;
    if (isHour) {
      const h12 = slot.h % 12 || 12;
      const ap = slot.h >= 12 ? 'pm' : 'am';
      lbl.innerHTML = `${h12}<br><span style="font-size:0.5rem">${ap}</span>`;
    } else if (isHalfHour) {
      lbl.style.color = 'var(--border)';
      lbl.style.fontSize = '0.5rem';
      lbl.style.paddingTop = '3px';
      lbl.textContent = '·';
    }
    if (isLast) lbl.dataset.last = 'true';
    grid.appendChild(lbl);

    const dz = document.createElement('div');
    dz.className = `tl-slot${isHour ? '' : ' half'}`;
    dz.style.gridRow = i + 1;
    dz.dataset.time = slot.time;
    if (isLast) dz.dataset.last = 'true';
    dz.addEventListener('dragover', ev => {
      ev.preventDefault();
      highlightDragSlots(slot.time);
    });
    dz.addEventListener('dragleave', ev => {
      if (!dz.contains(ev.relatedTarget)) clearSlotClasses();
    });
    dz.addEventListener('drop', ev => {
      clearSlotClasses();
      if (!slotConflict(slot.time)) onSlotDrop(ev, dz); else ev.preventDefault();
    });
    grid.appendChild(dz);
  });

  // Recurring event chips (read-only, placed by startTime)
  slots.forEach((slot, i) => {
    const r = recurByTime[slot.time];
    if (!r) return;
    const durMins = r.endTime
      ? Math.max(15, timeToMins(r.endTime) - timeToMins(r.startTime))
      : 15;
    const span = Math.max(1, Math.round(durMins / 15));
    const chip = document.createElement('div');
    chip.className = 'tl-recurring-chip';
    chip.style.gridColumn = '2'; chip.style.gridRow = `${i+1} / span ${span}`;
    chip.innerHTML = `<div class="tl-chip-top">
        <span class="tl-chip-text">${escHtml(r.name)}</span>
        <button class="tl-chip-remove" data-id="${escHtml(r.id)}">×</button>
      </div>
      <span class="tl-chip-dur">${fmt12h(r.startTime)}–${fmt12h(r.endTime || r.startTime)}</span>`;
    chip.querySelector('.tl-chip-remove').addEventListener('click', e => {
      e.stopPropagation();
      planSettings.recurring = planSettings.recurring.filter(rec => rec.id !== r.id);
      savePlanSettings();
      renderTimeline(todaysTasks());
      if (document.getElementById('plan-settings-panel').classList.contains('open')) renderPlanSettings();
    });
    grid.appendChild(chip);
  });

  // Task chips
  slots.forEach((slot, i) => {
    const t = scheduled[slot.time];
    if (!t) return;
    let span = Math.max(1, Math.round(t.duration / 15));

    const chip = document.createElement('div');
    chip.className = `tl-task-chip${span === 1 ? ' short' : ''}${t.done ? ' done' : ''}`;
    chip.style.gridColumn = '2'; chip.style.gridRow = `${i+1} / span ${span}`;
    chip.draggable = !t.done;
    chip.innerHTML = `<div class="tl-chip-top">
        <span class="tl-chip-text">${escHtml(t.text)}</span>
        <button class="tl-chip-remove" data-id="${escHtml(t.id)}">×</button>
      </div><span class="tl-chip-dur">${fmtPlanDur(t.duration)}</span>`;

    if (t.done) {
      chip.querySelector('.tl-chip-remove').addEventListener('click', e => {
        e.stopPropagation();
        const task = planner.find(x => x.id === t.id);
        if (task) { task.scheduledTime = null; savePlanner(planner); renderPlanner(); }
      });
      grid.appendChild(chip);
      return;
    }

    const resizeHandle = document.createElement('div');
    resizeHandle.className = 'tl-chip-resize';
    chip.appendChild(resizeHandle);

    // Drag to reschedule — custom drag image shows full chip height
    chip.addEventListener('dragstart', e => {
      e.stopPropagation();
      onTaskDragStart(e, t.id);
      const ghost = chip.cloneNode(true);
      ghost.style.cssText = `position:fixed;top:-9999px;width:${chip.offsetWidth}px;`
        + `height:${span * 18 - 4}px;opacity:0.85;pointer-events:none;`;
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, e.offsetX, e.offsetY);
      requestAnimationFrame(() => ghost.remove());
    });
    chip.addEventListener('dragend', onTaskDragEnd);
    chip.addEventListener('dragover', e => {
      e.preventDefault(); e.stopPropagation();
      highlightDragSlots(slot.time);
    });
    chip.addEventListener('dragleave', e => {
      if (!chip.contains(e.relatedTarget)) clearSlotClasses();
    });
    chip.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      clearSlotClasses();
      if (!slotConflict(slot.time)) {
        const dz = grid.querySelector(`.tl-slot[data-time="${slot.time}"]`);
        if (dz) onSlotDrop(e, dz);
      }
    });

    // Top resize handle — drag to change start time (keeps end time fixed)
    const topResizeHandle = document.createElement('div');
    topResizeHandle.className = 'tl-chip-resize-top';
    chip.appendChild(topResizeHandle);
    topResizeHandle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const startY = e.clientY;
      const origStartMins = timeToMins(t.scheduledTime);
      const endMins = Math.min(origStartMins + t.duration, planSettings.dayEnd * 60);
      function onMove(mv) {
        const gridRect = grid.getBoundingClientRect();
        const scheduleBottom = gridRect.top + slots.length * 18;
        const clampedY = Math.max(gridRect.top, Math.min(mv.clientY, scheduleBottom));
        const newSlotIdxRaw = Math.max(0, Math.min(slots.length - 1, Math.floor((clampedY - gridRect.top) / 18)));
        let newStartMins = slots[newSlotIdxRaw].h * 60 + slots[newSlotIdxRaw].m;
        newStartMins = Math.max(planSettings.dayStart * 60, newStartMins);
        newStartMins = Math.min(endMins - 15, newStartMins);
        // Don't overlap task ending just before
        tasks.forEach(other => {
          if (other.id !== t.id && !other.done && other.scheduledTime) {
            const otherEnd = timeToMins(other.scheduledTime) + (other.duration || 15);
            if (otherEnd <= endMins) newStartMins = Math.max(newStartMins, otherEnd);
          }
        });
        t.scheduledTime = minsToTime(newStartMins);
        t.duration = endMins - newStartMins;
        const newSpan = Math.max(1, Math.round(t.duration / 15));
        const newSlotIdx = slots.findIndex(s => s.time === t.scheduledTime);
        if (newSlotIdx !== -1) chip.style.gridRow = `${newSlotIdx + 1} / span ${Math.min(newSpan, slots.length - newSlotIdx)}`;
        chip.classList.toggle('short', newSpan === 1);
        const durEl = chip.querySelector('.tl-chip-dur');
        if (durEl) durEl.textContent = fmtPlanDur(t.duration);
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        savePlanner(planner);
        renderPlanner();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Bottom resize handle — drag to change duration (keeps start time fixed)
    resizeHandle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const startY = e.clientY;
      const startDuration = t.duration;
      const startMins = timeToMins(t.scheduledTime);

      function onMove(mv) {
        const gridRect = grid.getBoundingClientRect();
        const scheduleBottom = gridRect.top + slots.length * 18;
        const clampedY = Math.max(gridRect.top, Math.min(mv.clientY, scheduleBottom));
        const endSlotIdx = Math.min(slots.length - 1, Math.max(i, Math.floor((clampedY - gridRect.top) / 18)));
        let newDur = Math.max(15, (endSlotIdx - i + 1) * 15);
        // Cap at the start of the next scheduled task
        tasks.forEach(other => {
          if (other.id !== t.id && !other.done && other.scheduledTime) {
            const otherStart = timeToMins(other.scheduledTime);
            if (otherStart > startMins) newDur = Math.min(newDur, otherStart - startMins);
          }
        });
        t.duration = newDur;
        const newSpan = Math.max(1, Math.round(newDur / 15));
        chip.style.gridRow = `${i+1} / span ${newSpan}`;
        chip.classList.toggle('short', newSpan === 1);
        const durEl = chip.querySelector('.tl-chip-dur');
        if (durEl) durEl.textContent = fmtPlanDur(newDur);
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        savePlanner(planner);
        renderPlanner();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    grid.appendChild(chip);
  });

  grid.querySelectorAll('.tl-chip-remove').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); unscheduleTask(btn.dataset.id); })
  );

  // Current time line
  updateNowLine(grid, slots, planSettings.dayStart);

  // Auto-scroll to current hour on first render only
  if (!timelineScrolled) {
    timelineScrolled = true;
    const now = new Date();
    const tNow = `${String(now.getHours()).padStart(2,'0')}:00`;
    const target = grid.querySelector(`.tl-slot[data-time="${tNow}"]`);
    const wrap = document.getElementById('plan-tl-wrap');
    if (target && wrap) {
      requestAnimationFrame(() => {
        wrap.scrollTop = Math.max(0, target.getBoundingClientRect().top
          - wrap.getBoundingClientRect().top + wrap.scrollTop - 40);
      });
    }
  }
}

function updateNowLine(grid, slots, dayStart) {
  if (!grid) return;
  const existing = grid.querySelector('.tl-now-line');
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const dayStartMins = dayStart * 60;
  const dayEndMins = dayStartMins + slots.length * 15;
  if (nowMins < dayStartMins || nowMins >= dayEndMins) {
    if (existing) existing.remove();
    return;
  }
  const line = existing || document.createElement('div');
  if (!existing) { line.className = 'tl-now-line'; grid.appendChild(line); }
  line.style.top = ((nowMins - dayStartMins) / 15 * 18) + 'px';
}

const REC_DAY_LABELS = ['S','M','T','W','T','F','S'];

function makeTimeOptions(sel) {
  let html = '';
  for (let h = 0; h < 24; h++) {
    for (const m of [0, 30]) {
      const t = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      html += `<option value="${t}"${t === sel ? ' selected' : ''}>${fmt12h(t)}</option>`;
    }
  }
  return html;
}

function makeHourOptions(from, to, selected) {
  let html = '';
  for (let h = from; h <= to; h++) {
    let label;
    if (h === 0 || h === 24) label = '12 am (midnight)';
    else if (h === 12) label = '12 pm (noon)';
    else if (h < 12)  label = `${h} am`;
    else              label = `${h - 12} pm`;
    html += `<option value="${h}"${h === selected ? ' selected' : ''}>${label}</option>`;
  }
  return html;
}

function renderPlanSettings() {
  const panel = document.getElementById('plan-settings-panel');
  if (!panel) return;
  const { dayStart, dayEnd, recurring } = planSettings;

  const newDaysHTML = [1,2,3,4,5,6,0].map(d =>
    `<button class="rec-day-btn${[1,2,3,4,5].includes(d) ? ' on' : ''}" data-day="${d}">${REC_DAY_LABELS[d]}</button>`
  ).join('');

  const recRowsHTML = recurring.map(r => {
    const daysHTML = [1,2,3,4,5,6,0].map(d =>
      `<button class="rec-day-btn${r.days.includes(d) ? ' on' : ''}" data-day="${d}">${REC_DAY_LABELS[d]}</button>`
    ).join('');
    const timeRange = r.startTime ? `${fmt12h(r.startTime)}–${fmt12h(r.endTime || r.startTime)}` : '';
    return `<div class="recurring-row" data-id="${escHtml(r.id)}">
      <span class="recurring-row-time">${timeRange}</span>
      <span class="recurring-row-text">${escHtml(r.name)}</span>
      <div class="recurring-days">${daysHTML}</div>
      <button class="btn-edit" data-id="${escHtml(r.id)}" title="edit">✎</button>
      <button class="btn-delete" data-id="${escHtml(r.id)}" title="delete">×</button>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div class="plan-settings-heading">day range</div>
    <div class="plan-day-range">
      <label>from</label>
      <input type="number" class="plan-hr-input" id="ps-day-start" min="0" max="23" value="${dayStart}">
      <label>to</label>
      <input type="number" class="plan-hr-input" id="ps-day-end" min="1" max="24" value="${dayEnd}">
      <span style="font-size:0.72rem;color:var(--text-muted)">(24h)</span>
    </div>
    <div class="plan-settings-heading">recurring events</div>
    <div class="plan-add-recurring">
      <input type="time" class="rec-time-input" id="ps-rec-start" value="09:00">
      <span style="font-size:0.7rem;color:var(--text-muted);flex-shrink:0">–</span>
      <input type="time" class="rec-time-input" id="ps-rec-end" value="10:00">
      <input class="text-input" id="ps-rec-name" type="text" placeholder="event name" maxlength="80" autocorrect="off" autocomplete="off">
      <div class="rec-days-toggle" id="ps-rec-days">${newDaysHTML}</div>
      <button class="btn-primary btn-add" id="btn-add-recurring" title="add">+</button>
    </div>
    <div id="ps-recurring-list">${recRowsHTML || '<div style="font-size:0.8rem;color:var(--text-light);padding:2px 0">no recurring events yet</div>'}</div>
  `;

  document.getElementById('ps-day-start').addEventListener('change', e => {
    const v = parseInt(e.target.value);
    if (isNaN(v) || v < 0 || v > 23) return;
    planSettings.dayStart = v;
    if (planSettings.dayStart >= planSettings.dayEnd) planSettings.dayEnd = Math.min(24, planSettings.dayStart + 1);
    savePlanSettings();
    renderTimeline(todaysTasks());
    renderPlanSettings();
  });
  document.getElementById('ps-day-end').addEventListener('change', e => {
    const v = parseInt(e.target.value);
    if (isNaN(v) || v < 1 || v > 24) return;
    planSettings.dayEnd = v;
    if (planSettings.dayEnd <= planSettings.dayStart) planSettings.dayStart = Math.max(0, planSettings.dayEnd - 1);
    savePlanSettings();
    renderTimeline(todaysTasks());
    renderPlanSettings();
  });

  panel.querySelectorAll('#ps-rec-days .rec-day-btn').forEach(btn =>
    btn.addEventListener('click', () => btn.classList.toggle('on'))
  );

  document.getElementById('btn-add-recurring').addEventListener('click', e => {
    e.stopPropagation();
    const name      = document.getElementById('ps-rec-name').value.trim().toLowerCase();
    const startTime = document.getElementById('ps-rec-start').value;
    const endTime   = document.getElementById('ps-rec-end').value;
    const days      = [...panel.querySelectorAll('#ps-rec-days .rec-day-btn.on')].map(b => parseInt(b.dataset.day));
    if (!name) {
      document.getElementById('ps-rec-name').classList.add('flash-error');
      setTimeout(() => document.getElementById('ps-rec-name').classList.remove('flash-error'), 500);
      return;
    }
    if (!startTime || !endTime || endTime <= startTime || days.length === 0) return;
    planSettings.recurring.push({ id: uid(), name, startTime, endTime, days });
    savePlanSettings();
    renderTimeline(todaysTasks());
    renderPlanSettings();
  });

  panel.querySelectorAll('#ps-recurring-list .btn-delete').forEach(btn =>
    btn.addEventListener('click', e => {
      e.stopPropagation();
      planSettings.recurring = planSettings.recurring.filter(r => r.id !== btn.dataset.id);
      savePlanSettings();
      renderTimeline(todaysTasks());
      renderPlanSettings();
    })
  );

  panel.querySelectorAll('#ps-recurring-list .rec-day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.closest('.recurring-row').dataset.id;
      const rec = planSettings.recurring.find(r => r.id === id);
      if (!rec) return;
      const day = parseInt(btn.dataset.day);
      if (btn.classList.contains('on')) {
        if (rec.days.length <= 1) return;
        rec.days = rec.days.filter(d => d !== day);
        btn.classList.remove('on');
      } else {
        rec.days.push(day);
        btn.classList.add('on');
      }
      savePlanSettings();
      renderTimeline(todaysTasks());
    });
  });

  panel.querySelectorAll('#ps-recurring-list .btn-edit').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const rec = planSettings.recurring.find(r => r.id === id);
      if (!rec) return;
      const row = btn.closest('.recurring-row');
      const nameEl  = row.querySelector('.recurring-row-text');
      const timeEl  = row.querySelector('.recurring-row-time');
      const nameInput = document.createElement('input');
      nameInput.type = 'text'; nameInput.value = rec.name;
      nameInput.className = 'activity-row-input'; nameInput.style.flex = '1';
      nameInput.maxLength = 80;
      nameEl.replaceWith(nameInput);
      const startInput = document.createElement('input');
      startInput.type = 'time'; startInput.className = 'rec-time-input';
      startInput.value = rec.startTime || '09:00';
      const endInput = document.createElement('input');
      endInput.type = 'time'; endInput.className = 'rec-time-input';
      endInput.value = rec.endTime || '10:00';
      const sep = document.createElement('span');
      sep.textContent = '–'; sep.style.cssText = 'font-size:0.7rem;color:var(--text-muted)';
      if (timeEl) { timeEl.replaceWith(startInput); startInput.after(sep); sep.after(endInput); }
      nameInput.focus(); nameInput.select();
      let saved = false;
      function saveEdit() {
        if (saved) return; saved = true;
        const newName = nameInput.value.trim().toLowerCase();
        if (newName) rec.name = newName;
        if (startInput.value) rec.startTime = startInput.value;
        if (endInput.value && endInput.value > rec.startTime) rec.endTime = endInput.value;
        savePlanSettings();
        renderTimeline(todaysTasks());
        renderPlanSettings();
      }
      nameInput.addEventListener('keydown', ev => {
        if (ev.key === 'Enter') saveEdit();
        if (ev.key === 'Escape') { saved = true; renderPlanSettings(); }
      });
      nameInput.addEventListener('blur', saveEdit);
    });
  });
}

function renderPlanner() {
  const today = todayISO();
  let needsSave = false;

  // Clear scheduled time on carryover tasks
  planner.forEach(t => {
    if (t.date < today && t.scheduledTime !== null) { t.scheduledTime = null; needsSave = true; }
  });

  if (needsSave) savePlannerLocal(planner);
  const tasks = todaysTasks();
  const todayTasks = tasks.filter(t => t.date === today);
  const carryoverTasks = tasks.filter(t => t.date < today);
  const list = document.getElementById('plan-task-list');
  if (!list) return;
  list.innerHTML = '';

  function makeRow(t) {
    const row = document.createElement('div');
    row.className = 'plan-task-row' + (t.scheduledTime && !t.done ? ' scheduled' : '');
    row.dataset.id = t.id;
    if (!t.done) {
      row.draggable = true;
      row.addEventListener('dragstart', e => onTaskDragStart(e, t.id));
      row.addEventListener('dragend', onTaskDragEnd);
    }
    const recurBadge = t.recurringId ? `<span class="plan-recur-badge" title="recurring">↻</span>` : '';
    row.innerHTML = `
      <div class="check-circle${t.done ? ' checked' : ''}" data-id="${escHtml(t.id)}"></div>
      <span class="plan-task-text${t.done ? ' done-text' : ''}">${escHtml(t.text)}</span>
      ${recurBadge}
      <span class="plan-duration-badge">${fmtPlanDur(t.duration)}</span>
      <button class="btn-edit" title="edit" data-id="${escHtml(t.id)}">✎</button>
      <button class="btn-delete" title="delete" data-id="${escHtml(t.id)}">×</button>
    `;
    row.querySelector('.plan-duration-badge').addEventListener('click', e => {
      e.stopPropagation();
      const badge = e.currentTarget;
      const sel = document.createElement('select');
      sel.className = 'dur-inline-select';
      [[15,'15m'],[30,'30m'],[45,'45m'],[60,'1h'],[90,'1.5h'],[120,'2h'],[180,'3h']].forEach(([v, lbl]) => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = lbl;
        if (t.duration === v) opt.selected = true;
        sel.appendChild(opt);
      });
      badge.replaceWith(sel);
      sel.focus();
      let saved = false;
      function save() {
        if (saved) return; saved = true;
        t.duration = parseInt(sel.value);
        savePlanner(planner);
        renderPlanner();
      }
      sel.addEventListener('change', save);
      sel.addEventListener('blur', save);
    });
    return row;
  }

  if (todayTasks.length === 0 && carryoverTasks.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="empty-glyph">◌</span>
      <span class="empty-text">no tasks yet — add something to plan</span>
    </div>`;
  } else {
    todayTasks.forEach(t => list.appendChild(makeRow(t)));
    if (carryoverTasks.length > 0) {
      const div = document.createElement('div');
      div.className = 'plan-carryover-divider';
      div.textContent = 'carried over';
      list.appendChild(div);
      carryoverTasks.forEach(t => list.appendChild(makeRow(t)));
    }
  }

  list.querySelectorAll('.check-circle').forEach(c =>
    c.addEventListener('click', () => togglePlanTask(c.dataset.id))
  );
  list.querySelectorAll('.btn-edit').forEach(btn =>
    btn.addEventListener('click', e =>
      startEditPlanTask(e.currentTarget.dataset.id, e.currentTarget.closest('.plan-task-row'))
    )
  );
  list.querySelectorAll('.btn-delete').forEach(btn =>
    btn.addEventListener('click', e => deletePlanTask(e.currentTarget.dataset.id))
  );
  renderTimeline(tasks);
}

// Timeline column width resize (right-edge handle)
(function() {
  const handle = document.getElementById('tl-col-resize');
  const col    = document.querySelector('.plan-tl-col');
  if (!handle || !col) return;
  const savedW = parseInt(localStorage.getItem('nb_tl_width') || '0');
  if (savedW > 60) col.style.width = savedW + 'px';

  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = col.getBoundingClientRect().width;
    const bodyW  = col.closest('.plan-body').getBoundingClientRect().width;
    function onMove(mv) {
      const newW = Math.max(60, Math.min(bodyW - 180, startW + mv.clientX - startX));
      col.style.width = newW + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      localStorage.setItem('nb_tl_width', Math.round(col.getBoundingClientRect().width));
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

  wins = loadWins(); habits = loadHabits(); reminders = loadReminders();
  activities = loadActivities(); planner = loadPlanner(); smallTasks = loadSmallTasks();
  renderPlanner(); renderSmallTasks(); renderWins(); renderHabits(); renderReminders(); renderBored(); renderActivityList();
});

// User chip → sign in (if not signed in) or toggle sign-out popout
document.getElementById('user-chip').addEventListener('click', e => {
  e.stopPropagation();
  if (!localStorage.getItem('nb_google_signin')) {
    if (tokenClient) tokenClient.requestAccessToken({ prompt: 'select_account' });
    return;
  }
  document.getElementById('signout-popout').classList.toggle('open');
});



function doSignOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null;
  driveFileId = null;
  clearTokenSession();
  // Clear auth state
  localStorage.removeItem('nb_google_signin');
  localStorage.removeItem('nb_google_email');
  localStorage.removeItem('nb_google_name');
  localStorage.removeItem('nb_google_picture');
  // Clear all data from cache so nothing leaks when signed out
  localStorage.removeItem('sw_wins');
  localStorage.removeItem('sw_habits');
  localStorage.removeItem('sw_reminders');
  localStorage.removeItem('nb_activities');
  localStorage.removeItem('sw_planner');
  localStorage.removeItem('sw_small_tasks');
  localStorage.removeItem('sw_plan_settings');
  // Reset in-memory state to empty
  wins = []; habits = []; reminders = [];
  activities = DEFAULT_ACTIVITIES.map(a => ({ ...a }));
  planner = []; smallTasks = []; planSettings = { dayStart: 6, dayEnd: 12, recurring: [] };
  document.getElementById('signout-popout').classList.remove('open');
  updateAuthUI(false);
  renderWins(); renderHabits(); renderReminders(); renderBored(); renderActivityList(); renderPlanner(); renderSmallTasks();
}
document.getElementById('btn-cancel-signout').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('signout-popout').classList.remove('open');
});
document.getElementById('btn-confirm-signout').addEventListener('click', doSignOut);
document.getElementById('btn-settings-signin').addEventListener('click', () => {
  document.getElementById('settings-overlay').style.display = 'none';
  if (tokenClient) tokenClient.requestAccessToken({ prompt: 'select_account' });
});
document.getElementById('btn-modal-signout').addEventListener('click', () => {
  document.getElementById('settings-overlay').style.display = 'none';
  doSignOut();
});

// Close popout when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('user-chip-wrap').contains(e.target))
    document.getElementById('signout-popout').classList.remove('open');
});

// Settings modal
document.getElementById('btn-settings').addEventListener('click', () => {
  document.getElementById('settings-overlay').style.display = 'flex';
});
document.getElementById('btn-settings-close').addEventListener('click', () => {
  document.getElementById('settings-overlay').style.display = 'none';
});
document.getElementById('settings-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('settings-overlay'))
    document.getElementById('settings-overlay').style.display = 'none';
});

// Look-back pills
document.getElementById('lookback-pills').addEventListener('click', e => {
  const pill = e.target.closest('.lookback-pill');
  if (!pill) return;
  document.querySelectorAll('.lookback-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  winsLookback = pill.dataset.days ? parseInt(pill.dataset.days) : 0;
  localStorage.setItem('nb_lookback', winsLookback);
  renderWins();
});


document.getElementById('theme-swatches').addEventListener('click', e => {
  const swatch = e.target.closest('.theme-swatch');
  if (!swatch) return;
  applyTheme(swatch.dataset.theme);
});

// ── Init ─────────────────────────────────────────────────────────────────
// Header date — updates at midnight
function updateHeaderDate() {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const d = new Date();
  document.getElementById('header-date').textContent = `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}
function scheduleHeaderDateUpdate() {
  const now = new Date();
  const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  setTimeout(() => { updateHeaderDate(); renderPlanner(); scheduleHeaderDateUpdate(); }, nextMidnight - now);
}
applyTheme(localStorage.getItem('nb_theme') || 'rose');
updateHeaderDate();
scheduleHeaderDateUpdate();

// Update now line every 10 seconds
setInterval(() => {
  const grid = document.getElementById('plan-timeline');
  if (grid) updateNowLine(grid, generateTimeSlots(planSettings.dayStart, planSettings.dayEnd), planSettings.dayStart);
}, 10000);

// Restore look-back pill
if (winsLookback > 0) {
  document.querySelectorAll('.lookback-pill').forEach(p => {
    p.classList.toggle('active', parseInt(p.dataset.days || '0') === winsLookback);
  });
}

// Restore auth UI immediately from localStorage so sign-in button never flickers visible
if (localStorage.getItem('nb_google_signin')) updateAuthUI(true);

wins = loadWins();
habits = loadHabits();
reminders = loadReminders();
activities = loadActivities();
planner = loadPlanner();
smallTasks = loadSmallTasks();
planSettings = loadPlanSettings();
renderPlanner();
renderSmallTasks();
renderWins();
renderHabits();
renderReminders();
renderBored();
renderActivityList();

// Init Google auth once GIS library is ready
function tryInitAuth() {
  if (window.google?.accounts?.oauth2) {
    initGoogleAuth();
  } else {
    setTimeout(tryInitAuth, 100);
  }
}
tryInitAuth();
</script>
