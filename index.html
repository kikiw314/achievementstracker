<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notebook</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23f5d5e0'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-size='20' fill='%23d4849a'%3E✦%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scrollbar-gutter: stable; }

:root {
  --accent:       #d4849a;
  --accent-hover: #bf6f88;
  --bg:           #f9f9f9;
  --bg-card:      #fff;
  --text-dark:    #3d1a28;
  --text-plum:    #5c2d44;
  --text-muted:   #c084a0;
  --text-gray:    #999;
  --text-light:   #bbb;
  --border:       #e5e5e5;
  --border-light: #f0f0f0;
  --border-blush: #edccd6;
  --ring-bg:      #f5d5e0;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-plum);
  min-height: 100vh;
  padding: 0 0 60px;
}

/* ── Header ─────────────────────────────────────────── */
header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 38px 0 22px;
}
.app-title {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-dark);
  letter-spacing: -0.02em;
}
.app-title .glyph { color: var(--accent); }

/* ── Layout wrapper ─────────────────────────────────── */
.container { padding: 0 20px; }

/* Constrain all panels + chrome to a centered column */
header,
.tabs,
#panel-wins,
#panel-habits,
#panel-reminders,
#panel-bored,
#panel-plan {
  max-width: 520px;
  margin-left: auto;
  margin-right: auto;
}

/* ── Tab nav ─────────────────────────────────────────── */
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 28px;
}
.tab-btn {
  padding: 7px 18px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-gray);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
}
.tab-btn:hover { border-color: var(--border-blush); color: var(--text-plum); }
.tab-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── Panel ───────────────────────────────────────────── */
.panel { display: none; }
.panel.active { display: block; }

/* ── Input row ───────────────────────────────────────── */
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  align-items: center;
}
.text-input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text-plum);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  font-weight: 400;
  outline: none;
  transition: border-color 0.15s;
  text-transform: lowercase;
}
.text-input::placeholder { color: var(--text-light); }
.text-input:focus { border-color: var(--accent); }
.text-input.flash-error {
  border-color: var(--accent) !important;
  animation: flashBorder 0.4s ease;
}

@keyframes flashBorder {
  0%   { border-color: var(--accent); }
  50%  { border-color: #ff8fa0; }
  100% { border-color: var(--accent); }
}

.btn-primary {
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-add {
  padding: 0;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  font-size: 1.2rem;
  line-height: 1;
  flex-shrink: 0;
}

/* ── Section label ───────────────────────────────────── */
.day-label {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 20px 0 10px;
}
.day-label:first-child { margin-top: 0; }

/* ── Win card ────────────────────────────────────────── */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.win-card {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 14px;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 12px;
  margin-bottom: 7px;
  transition: border-color 0.15s;
  animation: slideIn 0.2s ease;
  position: relative;
}
.win-card:hover { border-color: var(--border-blush); }
.win-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 6px;
}
.win-body { flex: 1; min-width: 0; }
.win-note {
  font-size: 0.855rem;
  font-weight: 400;
  color: var(--text-plum);
  line-height: 1.4;
  word-break: break-word;
  text-transform: lowercase;
}
.win-time {
  font-size: 0.72rem;
  color: var(--text-light);
  flex-shrink: 0;
  margin-top: 3px;
  padding-top: 2px;
}
.btn-delete {
  background: none;
  border: none;
  color: var(--text-light);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 4px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
}
.win-card:hover .btn-delete,
.habit-row:hover .btn-delete,
.reminder-row:hover .btn-delete,
.activity-row:hover .btn-delete,
.plan-task-row:hover .btn-delete { opacity: 1; }
.btn-delete:hover { color: var(--accent-hover); }
.btn-edit {
  background: none;
  border: none;
  color: var(--text-light);
  cursor: pointer;
  font-size: 0.85rem;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 4px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
}
.activity-row:hover .btn-edit,
.plan-task-row:hover .btn-edit { opacity: 1; }
.btn-edit:hover { color: var(--accent-hover); }
.activity-row-input {
  flex: 1;
  font-size: 0.83rem;
  color: var(--text-plum);
  font-family: 'DM Sans', sans-serif;
  border: none;
  outline: none;
  background: transparent;
  padding: 0;
  min-width: 0;
  text-transform: lowercase;
}

/* ── Empty state ─────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 52px 0 32px;
  color: var(--text-muted);
}
.empty-glyph {
  font-size: 1.6rem;
  display: block;
  margin-bottom: 10px;
  opacity: 0.5;
}
.empty-text {
  font-size: 0.82rem;
  font-weight: 400;
  opacity: 0.7;
}

/* ── Habits tab ──────────────────────────────────────── */
.habits-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.habits-progress {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-gray);
}

.habit-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 12px;
  margin-bottom: 7px;
  transition: border-color 0.15s;
  animation: slideIn 0.2s ease;
  position: relative;
}
.habit-row:hover { border-color: var(--border-blush); }

.check-circle {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid var(--border-blush);
  background: var(--ring-bg);
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
}
.check-circle.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.check-circle.checked::after {
  content: '';
  display: block;
  width: 5px;
  height: 9px;
  border-right: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(40deg) translateY(-1px);
}
.check-circle:hover:not(.checked) { border-color: var(--accent); }

.habit-body { flex: 1; min-width: 0; }
.habit-name {
  font-size: 0.855rem;
  font-weight: 400;
  color: var(--text-plum);
  text-transform: lowercase;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.habit-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
}
.dot.filled { background: var(--accent); }
.dot.past { opacity: 0.5; }

.streak-badge {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-light);
  flex-shrink: 0;
  min-width: 24px;
  text-align: right;
}
.streak-badge.lit { color: var(--accent); }

/* ── Reminders tab ───────────────────────────────────── */
.reminder-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 12px;
  margin-bottom: 7px;
  transition: border-color 0.15s;
  animation: slideIn 0.2s ease;
}
.reminder-row:hover { border-color: var(--border-blush); }
.reminder-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}
.reminder-text {
  flex: 1;
  font-size: 0.855rem;
  font-weight: 400;
  color: var(--text-plum);
  text-transform: lowercase;
  word-break: break-word;
  line-height: 1.4;
}

/* ── Bored tab ───────────────────────────────────────── */
.bored-intro {
  text-align: center;
  padding: 40px 0 32px;
}
.bored-heading {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 18px;
}
.btn-im-bored {
  padding: 11px 32px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-im-bored:hover { background: var(--accent-hover); }

.activity-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border-blush);
  border-radius: 16px;
  padding: 22px 20px 16px;
  margin-bottom: 14px;
  animation: slideIn 0.2s ease;
}
.activity-text {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-dark);
  text-transform: lowercase;
  line-height: 1.45;
  margin-bottom: 16px;
}
.activity-actions {
  display: flex;
  gap: 8px;
}
.btn-complete {
  padding: 8px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-complete:hover { background: var(--accent-hover); }
.btn-reroll {
  padding: 8px 16px;
  background: none;
  color: var(--text-muted);
  border: 1.5px solid var(--border-blush);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-reroll:hover { border-color: var(--accent); color: var(--accent); }

.customize-toggle {
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  padding: 2px 0;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color 0.15s;
}
.customize-toggle:hover { color: var(--accent); }
.customize-toggle .arrow { display: inline-block; transition: transform 0.2s; }
.customize-toggle.open .arrow { transform: rotate(180deg); }

.customize-panel { display: none; }
.customize-panel.open { display: block; }

.activity-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 10px;
  margin-bottom: 6px;
  transition: border-color 0.15s;
}
.activity-row:hover { border-color: var(--border-blush); }
.activity-row-text {
  flex: 1;
  font-size: 0.83rem;
  color: var(--text-plum);
  text-transform: lowercase;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.btn-recurring {
  padding: 3px 10px;
  border-radius: 999px;
  border: 1.5px solid var(--border-blush);
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  color: var(--text-muted);
  flex-shrink: 0;
}
.btn-recurring.on {
  background: var(--ring-bg);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Time filters ────────────────────────────────────── */
.time-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 24px;
}
.time-pill {
  padding: 5px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--border-blush);
  background: var(--bg-card);
  color: var(--text-plum);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s ease;
}
.time-pill:hover { border-color: var(--accent); color: var(--accent); }
.time-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.duration-select {
  padding: 10px 8px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text-plum);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
  flex-shrink: 0;
}
.duration-select:focus { border-color: var(--accent); }

.activity-duration {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 500;
  margin-top: -10px;
  margin-bottom: 14px;
}
.duration-tag {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 500;
  flex-shrink: 0;
  cursor: pointer;
}
.duration-tag:hover { color: var(--accent); }
.dur-inline-select {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem; font-weight: 500;
  color: var(--text-muted);
  background: var(--bg-card);
  border: 1.5px solid var(--accent);
  border-radius: 999px;
  padding: 1px 5px;
  outline: none; cursor: pointer; flex-shrink: 0;
}

/* ── Auth area ───────────────────────────────────────── */
#auth-area {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
#header-date {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
}
.icon-btn {
  background: none;
  border: none;
  color: var(--text-gray);
  font-size: 1.05rem;
  line-height: 1;
  cursor: pointer;
  padding: 4px 5px;
  border-radius: 6px;
  transition: color 0.15s;
  display: flex;
  align-items: center;
}
.icon-btn:hover { color: var(--accent); }
.icon-btn.spinning { animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.btn-google-sign-in {
  padding: 7px 16px;
  border-radius: 999px;
  border: 1.5px solid var(--border-blush);
  background: var(--bg-card);
  color: var(--text-plum);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-google-sign-in:hover { border-color: var(--accent); color: var(--accent); }
.btn-google-sign-in.hidden { display: none; }

/* User chip */
.user-chip-wrap { position: relative; }
.user-chip {
  display: none;
  align-items: center;
  gap: 7px;
  padding: 4px 10px 4px 4px;
  border-radius: 999px;
  background: var(--ring-bg);
  border: 1.5px solid var(--border-blush);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.user-chip:hover { border-color: var(--accent); }
.user-chip.visible { display: flex; }
.user-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 0.72rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  text-transform: uppercase;
  overflow: hidden;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.user-name {
  font-size: 0.78rem;
  color: var(--text-plum);
  font-weight: 500;
  max-width: 100px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Sign-out popout */
.signout-popout {
  position: absolute;
  top: calc(100% + 10px);
  right: 0;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 14px;
  padding: 14px 16px 12px;
  box-shadow: 0 8px 28px rgba(61,26,40,0.13);
  z-index: 300;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-6px);
  transition: opacity 0.15s ease, transform 0.15s ease, visibility 0.15s ease;
  min-width: 170px;
  white-space: nowrap;
}
.signout-popout.open { opacity: 1; visibility: visible; transform: translateY(0); }
.signout-popout-email {
  font-size: 0.75rem;
  color: var(--text-gray);
  margin-bottom: 10px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.signout-popout-label {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-plum);
  margin-bottom: 10px;
}
.signout-popout-actions { display: flex; gap: 6px; }
.btn-pop-cancel {
  flex: 1;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: none;
  color: var(--text-gray);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
}
.btn-pop-cancel:hover { border-color: var(--border-blush); color: var(--text-plum); }
.btn-pop-signout {
  flex: 1;
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s;
}
.btn-pop-signout:hover { background: var(--accent-hover); }

/* Settings modal */
.modal {
  width: 460px;
  max-width: calc(100vw - 32px);
  max-height: 82vh;
  background: #fff;
  border: 1.5px solid var(--border-light);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(61,26,40,0.15);
  display: flex;
  flex-direction: column;
  animation: modalIn 0.2s ease;
  overflow: hidden;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(2%); }
  to   { opacity: 1; transform: translateY(0); }
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}
.modal-title { font-size: 0.9rem; font-weight: 600; color: var(--text-dark); }
.modal-close {
  background: none;
  border: none;
  font-size: 1.2rem;
  color: var(--text-light);
  cursor: pointer;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 4px;
  transition: color 0.15s;
}
.modal-close:hover { color: var(--accent); }
.modal-body {
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 26px;
}
.modal-section-label {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}
.lookback-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.lookback-pill {
  padding: 5px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--border-blush);
  background: var(--bg-card);
  color: var(--text-plum);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
}
.lookback-pill:hover { border-color: var(--accent); color: var(--accent); }
.lookback-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.modal-signout-link {
  background: none;
  border: none;
  color: var(--text-gray);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
  transition: color 0.15s;
  text-align: left;
}
.modal-signout-link:hover { color: var(--accent); }
.btn-settings-signin {
  padding: 7px 18px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: #fff;
  color: var(--text-gray);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn-settings-signin:hover { border-color: var(--accent); color: var(--accent); }
.theme-swatches { display: flex; gap: 10px; flex-wrap: wrap; }
.theme-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  outline: none;
  padding: 0;
  cursor: pointer;
  transition: transform 0.12s;
  flex-shrink: 0;
}
.theme-swatch:hover { transform: scale(1.15); }
.theme-swatch.active { box-shadow: 0 0 0 2.5px #fff, 0 0 0 5px var(--text-dark); }

/* ── Planner tab ─────────────────────────────────────── */
.plan-input-area { max-width: 520px; margin: 0 auto; }
.plan-settings-toggle {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.78rem;
  color: var(--text-muted);
  cursor: pointer;
  padding-bottom: 18px;
  transition: color 0.15s;
  user-select: none;
}
.plan-settings-toggle:hover { color: var(--accent); }
.plan-settings-arrow { display: inline-block; transition: transform 0.2s; font-size: 0.7rem; }
.plan-settings-toggle.open .plan-settings-arrow { transform: rotate(180deg); }

.plan-body { display: flex; gap: 10px; align-items: flex-start; }
/* Column that holds the wrap + the resize handles */
.plan-tl-col {
  width: 330px; flex-shrink: 0;
  display: flex; flex-direction: column;
  position: relative;
}
.plan-tasks-col { flex: 1; min-width: 170px; overflow: hidden; }

/* Right-edge drag handle — sits in the gap between timeline and tasks */
.tl-col-resize {
  position: absolute; top: 0; right: -7px;
  width: 14px; height: 100%;
  cursor: ew-resize; z-index: 5;
  display: flex; align-items: center; justify-content: center;
}
.tl-col-resize::after {
  content: '';
  width: 2px; height: 40px;
  background: var(--border-light);
  border-radius: 999px;
  transition: background 0.15s;
}
.tl-col-resize:hover::after { background: var(--text-muted); }

.plan-tl-wrap {
  overflow-x: hidden;
  overflow-y: auto;
  border: 1.5px solid var(--border-light);
  border-radius: 12px 12px 0 0;
  scroll-behavior: smooth;
}
@media (max-width: 480px) {
  .plan-body { flex-direction: column; }
  .plan-tasks-col { width: 100%; }
}

/* Settings panel */
.plan-settings-panel {
  display: none;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 14px;
  padding: 16px 18px 18px;
  margin-bottom: 22px;
  animation: slideIn 0.15s ease;
}
.plan-settings-panel.open { display: block; }
.plan-settings-heading {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 16px 0 10px;
}
.plan-settings-heading:first-child { margin-top: 0; }
.plan-day-range { display: flex; align-items: center; gap: 8px; }
.plan-day-range label { font-size: 0.82rem; color: var(--text-plum); }

/* Recurring events */
.recurring-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  background: var(--bg);
  border: 1.5px solid var(--border-light);
  border-radius: 10px;
  margin-bottom: 6px;
  transition: border-color 0.15s;
  flex-wrap: wrap;
}
.recurring-row:hover { border-color: var(--border-blush); }
.recurring-row-text {
  font-size: 0.8rem;
  color: var(--text-plum);
  text-transform: lowercase;
  flex: 1;
  min-width: 60px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.recurring-row-time { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; flex-shrink: 0; }
.recurring-days { display: flex; gap: 3px; flex-shrink: 0; }
.rec-day-btn {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--border); background: none;
  color: var(--text-gray); font-family: 'DM Sans', sans-serif;
  font-size: 0.6rem; font-weight: 600; cursor: pointer;
  transition: all 0.12s; padding: 0;
  display: flex; align-items: center; justify-content: center;
}
.rec-day-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.rec-day-btn:hover:not(.on) { border-color: var(--border-blush); color: var(--text-plum); }
.recurring-dur-badge {
  font-size: 0.65rem; color: var(--text-muted);
  background: var(--ring-bg); padding: 2px 6px;
  border-radius: 999px; flex-shrink: 0;
}
.plan-add-recurring {
  display: flex; gap: 6px; margin-bottom: 10px;
  align-items: center; flex-wrap: wrap;
}
.plan-add-recurring .text-input { flex: 1; min-width: 100px; font-size: 0.82rem; }
.rec-time-select, .rec-dur-select {
  padding: 8px 6px; border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--bg-card); color: var(--text-plum);
  font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
  outline: none; cursor: pointer; flex-shrink: 0; transition: border-color 0.15s;
}
.rec-time-select:focus, .rec-dur-select:focus { border-color: var(--accent); }
.rec-days-toggle { display: flex; gap: 3px; }

/* Timeline single-column */
.plan-timeline {
  display: grid;
  grid-template-columns: 38px 1fr;
  grid-auto-rows: 22px;
  overflow: hidden;
  position: relative;
}
.tl-label {
  font-size: 0.57rem; font-weight: 500; color: var(--text-light);
  padding: 4px 3px 0; text-align: right;
  border-right: 1px solid var(--border-light);
  border-bottom: 1px solid var(--border-light);
  background: var(--bg-card); line-height: 1.15;
}
.tl-label.half { color: transparent; }
.tl-label[data-last] { border-bottom: none; }
.tl-slot {
  border-bottom: 1px solid var(--border-light);
  background: var(--bg-card);
  transition: background 0.1s;
}
.tl-slot.half { background: var(--bg); }
.tl-slot.drag-over { background: var(--ring-bg) !important; }
.tl-slot[data-last] { border-bottom: none; }
.tl-task-chip {
  z-index: 2; position: relative;
  background: var(--ring-bg); border: 1.5px solid var(--border-blush);
  border-radius: 6px; margin: 2px; overflow: hidden;
  display: flex; flex-direction: column; cursor: grab;
}
.tl-chip-top { display: flex; align-items: center; gap: 3px; padding: 3px 4px 1px; }
.tl-task-chip.short .tl-chip-top { padding: 1px 4px; }
.tl-task-chip.short .tl-chip-dur { display: none; }
.tl-task-chip.done { opacity: 0.45; cursor: default; }
.tl-task-chip.done .tl-chip-text { text-decoration: line-through; }
.tl-chip-text {
  flex: 1; font-size: 0.67rem; font-weight: 500; color: var(--text-plum);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  text-transform: lowercase;
}
.tl-chip-remove {
  pointer-events: all; background: none; border: none;
  color: var(--text-light); cursor: pointer;
  font-size: 0.8rem; line-height: 1; padding: 0; flex-shrink: 0;
  transition: color 0.12s;
}
.tl-chip-remove:hover { color: var(--accent); }
.tl-chip-dur { font-size: 0.56rem; color: var(--text-muted); padding: 0 4px 3px; margin-top: auto; }
.tl-recurring-chip {
  pointer-events: none; z-index: 1;
  background: var(--accent); border-radius: 6px;
  margin: 2px; overflow: hidden;
  display: flex; flex-direction: column; opacity: 0.6;
}
.tl-recurring-chip .tl-chip-text { color: #fff; }
.tl-recurring-chip .tl-chip-dur  { color: rgba(255,255,255,0.8); }
.tl-recurring-chip .tl-chip-remove {
  pointer-events: all; color: rgba(255,255,255,0.75);
}
.tl-recurring-chip .tl-chip-remove:hover { color: #fff; }

/* Plan task rows */
.plan-tasks-label {
  font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
}
.plan-task-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; background: var(--bg-card);
  border: 1.5px solid var(--border-light); border-radius: 12px;
  margin-bottom: 7px; transition: border-color 0.15s;
  animation: slideIn 0.2s ease; position: relative; cursor: grab;
}
.plan-task-row:hover { border-color: var(--border-blush); }
.plan-task-row.dragging { opacity: 0.5; border-style: dashed; }
.plan-task-row.scheduled { border-color: var(--border-blush); background: var(--ring-bg); }
.plan-task-text {
  flex: 1; font-size: 0.855rem; font-weight: 400; color: var(--text-plum);
  text-transform: lowercase; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.plan-task-text.done-text { text-decoration: line-through; color: var(--text-light); }
.plan-carryover-from { font-size: 0.65rem; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; }
.plan-duration-badge {
  font-size: 0.7rem; font-weight: 500; color: var(--text-muted);
  background: var(--ring-bg); padding: 2px 7px;
  border-radius: 999px; flex-shrink: 0; white-space: nowrap;
  cursor: pointer;
}
.plan-duration-badge:hover { background: var(--border-blush); color: var(--accent); }
.plan-time-chip { font-size: 0.72rem; font-weight: 500; color: var(--accent); flex-shrink: 0; white-space: nowrap; }
.plan-carryover-divider {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.7rem; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 10px;
}
.plan-carryover-divider::before, .plan-carryover-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border-light);
}
.plan-custom-dur-input {
  width: 58px; padding: 10px 6px; border: 1.5px solid var(--border);
  border-radius: 10px; background: var(--bg-card); color: var(--text-plum);
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
  outline: none; transition: border-color 0.15s; flex-shrink: 0;
}
.plan-custom-dur-input:focus { border-color: var(--accent); }

/* Current time line */
.tl-now-line {
  position: absolute; left: 38px; right: 2px;
  height: 2px; background: var(--accent);
  z-index: 6; pointer-events: none; border-radius: 1px;
}
.tl-now-line::before {
  content: ''; position: absolute;
  left: -5px; top: -4px;
  width: 9px; height: 9px;
  border-radius: 50%; background: var(--accent);
}

/* Chip resize handles */
.tl-chip-resize, .tl-chip-resize-top {
  position: absolute; left: 0; right: 0;
  height: 7px; cursor: ns-resize;
  background: transparent;
  transition: background 0.12s;
}
.tl-chip-resize { bottom: 0; border-radius: 0 0 4px 4px; }
.tl-chip-resize-top { top: 0; border-radius: 4px 4px 0 0; }
.tl-task-chip:hover .tl-chip-resize,
.tl-task-chip:hover .tl-chip-resize-top { background: rgba(180,100,120,0.25); }

/* Tasks col drop-to-unschedule indicator */
.plan-tasks-col.drag-over { box-shadow: 0 0 0 1.5px var(--accent); border-radius: 10px; }

/* Small tasks section */
.small-tasks-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1.5px solid var(--border-light);
}
.small-tasks-input-row { margin-bottom: 10px; }
.small-task-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; background: var(--bg-card);
  border: 1.5px solid var(--border-light); border-radius: 10px;
  margin-bottom: 6px; position: relative;
}
.small-task-row:hover { border-color: var(--border-blush); }
.small-task-row:hover .btn-delete { opacity: 1; }
.small-task-text {
  flex: 1; font-size: 0.855rem; font-weight: 400; color: var(--text-plum);
  text-transform: lowercase; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.small-task-text.done-text { text-decoration: line-through; color: var(--text-light); }

/* Day-range hour inputs */
.plan-hr-input {
  width: 42px; padding: 7px 4px;
  border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--bg-card); color: var(--text-plum);
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  text-align: center; outline: none; transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.plan-hr-input::-webkit-outer-spin-button,
.plan-hr-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.plan-hr-input:focus { border-color: var(--accent); }

/* Recurring time inputs (start / end) */
.rec-time-input, .rec-date-input {
  padding: 7px 5px; border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--bg-card); color: var(--text-plum);
  font-family: 'DM Sans', sans-serif; font-size: 0.75rem;
  outline: none; cursor: pointer; flex-shrink: 0;
  transition: border-color 0.15s;
}
.rec-time-input:focus, .rec-date-input:focus { border-color: var(--accent); }
/* Recurring indicator badge on task rows */
.plan-recur-badge {
  font-size: 0.65rem; color: var(--text-muted); flex-shrink: 0;
}

/* Timeline panel resize handle — full-width bar below the wrap */
.tl-wrap-resize {
  width: 100%; height: 12px;
  cursor: ns-resize; flex-shrink: 0;
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-top: none;
  border-radius: 0 0 12px 12px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.tl-wrap-resize:hover { background: var(--ring-bg); }
.tl-wrap-resize::after {
  content: '';
  width: 36px; height: 2.5px;
  background: var(--border);
  border-radius: 999px;
  transition: background 0.15s;
}
.tl-wrap-resize:hover::after { background: var(--text-muted); }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="app-title">notebook <span class="glyph">✦</span></span>
    <div id="auth-area">
      <span id="header-date"></span>
      <button id="btn-sync" class="icon-btn" title="sync">↻</button>
      <button id="btn-settings" class="icon-btn" title="settings">⚙</button>
      <button id="btn-sign-in" class="btn-google-sign-in">sign in with google</button>
      <div class="user-chip-wrap" id="user-chip-wrap">
        <div class="user-chip" id="user-chip">
          <div class="user-avatar" id="user-avatar"></div>
          <span class="user-name" id="user-name"></span>
        </div>
        <div class="signout-popout" id="signout-popout">
          <div class="signout-popout-email" id="signout-email"></div>
          <div class="signout-popout-label">sign out?</div>
          <div class="signout-popout-actions">
            <button class="btn-pop-cancel" id="btn-cancel-signout">cancel</button>
            <button class="btn-pop-signout" id="btn-confirm-signout">sign out</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Tab nav -->
  <nav class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="plan" role="tab" aria-selected="true">plan</button>
    <button class="tab-btn" data-tab="wins" role="tab" aria-selected="false">wins</button>
    <button class="tab-btn" data-tab="habits" role="tab" aria-selected="false">habits</button>
    <button class="tab-btn" data-tab="reminders" role="tab" aria-selected="false">reminders</button>
    <button class="tab-btn" data-tab="bored" role="tab" aria-selected="false">bored?</button>
  </nav>

  <!-- ── PLAN PANEL ── -->
  <section id="panel-plan" class="panel active" role="tabpanel">
    <div class="plan-input-area">
      <div class="input-row">
        <input
          id="plan-input"
          class="text-input"
          type="text"
          placeholder="what do you need to do today?"
          maxlength="120"
          autocomplete="off"
          autocorrect="off"
        >
        <select id="plan-duration" class="duration-select">
          <option value="15">15m</option>
          <option value="30" selected>30m</option>
          <option value="45">45m</option>
          <option value="60">1h</option>
          <option value="90">1.5h</option>
          <option value="120">2h</option>
          <option value="180">3h</option>
          <option value="custom">custom</option>
        </select>
        <input id="plan-custom-dur" type="number" min="5" max="480" placeholder="min" class="plan-custom-dur-input" style="display:none">
        <button class="btn-primary btn-add" id="btn-add-plan" title="add task">+</button>
      </div>
      <span class="plan-settings-toggle" id="btn-plan-settings">settings <span class="plan-settings-arrow">↓</span></span>
      <div class="plan-settings-panel" id="plan-settings-panel"></div>
    </div>
    <div class="plan-body">
      <div class="plan-tl-col">
        <div class="tl-col-resize" id="tl-col-resize"></div>
        <div class="plan-tl-wrap" id="plan-tl-wrap">
          <div class="plan-timeline" id="plan-timeline"></div>
        </div>
        <div class="tl-wrap-resize" id="tl-wrap-resize"></div>
      </div>
      <div class="plan-tasks-col">
        <div class="plan-tasks-label">tasks</div>
        <div id="plan-task-list"></div>
      </div>
    </div>
    <div class="small-tasks-section">
      <div class="plan-tasks-label">small tasks</div>
      <div class="input-row small-tasks-input-row">
        <input id="small-task-input" class="text-input" type="text" placeholder="quick task..." maxlength="120" autocomplete="off" autocorrect="off">
        <button class="btn-primary btn-add" id="btn-add-small-task" title="add">+</button>
      </div>
      <div id="small-task-list"></div>
    </div>
  </section>

  <!-- ── WINS PANEL ── -->
  <section id="panel-wins" class="panel" role="tabpanel">
    <div class="input-row">
      <input
        id="win-input"
        class="text-input"
        type="text"
        placeholder="what did you do today?"
        maxlength="120"
        autocomplete="off"
        autocorrect="off"
        spellcheck="true"
      >
      <button class="btn-primary" id="btn-log">log it</button>
    </div>
    <div id="wins-feed"></div>
  </section>

  <!-- ── HABITS PANEL ── -->
  <section id="panel-habits" class="panel" role="tabpanel">
    <div class="input-row">
      <input
        id="habit-input"
        class="text-input"
        type="text"
        placeholder="new habit name"
        maxlength="80"
        autocomplete="off"
        autocorrect="off"
      >
      <button class="btn-primary btn-add" id="btn-add-habit" title="add habit">+</button>
    </div>
    <div class="habits-header">
      <span class="day-label" style="margin:0">today</span>
      <span class="habits-progress" id="habits-progress"></span>
    </div>
    <div id="habits-list"></div>
  </section>

  <!-- ── REMINDERS PANEL ── -->
  <section id="panel-reminders" class="panel" role="tabpanel">
    <div class="input-row">
      <input
        id="reminder-input"
        class="text-input"
        type="text"
        placeholder="e.g. review your notes every evening"
        maxlength="120"
        autocomplete="off"
        autocorrect="off"
      >
      <button class="btn-primary btn-add" id="btn-add-reminder" title="add reminder">+</button>
    </div>
    <div id="reminders-list"></div>
  </section>

  <!-- ── BORED PANEL ── -->
  <section id="panel-bored" class="panel" role="tabpanel">
    <div class="time-filters" id="time-filters">
      <button class="time-pill active" data-dur="">any time</button>
      <button class="time-pill" data-dur="5">5 min</button>
      <button class="time-pill" data-dur="15">15 min</button>
      <button class="time-pill" data-dur="30">30 min</button>
      <button class="time-pill" data-dur="60">1 hr</button>
    </div>
    <div id="bored-main"></div>
    <button class="customize-toggle" id="btn-customize-toggle">
      customize <span class="arrow">↓</span>
    </button>
    <div class="customize-panel" id="customize-panel">
      <div class="input-row">
        <input
          id="activity-input"
          class="text-input"
          type="text"
          placeholder="add an activity"
          maxlength="100"
          autocomplete="off"
          autocorrect="off"
        >
        <select id="activity-duration" class="duration-select">
          <option value="">no time</option>
          <option value="5">5 min</option>
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="60">1 hr</option>
        </select>
        <button class="btn-primary btn-add" id="btn-add-activity" title="add">+</button>
      </div>
      <div id="activity-list"></div>
    </div>
  </section>

// ── Utility ─────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isoFromEpoch(ms) {
  const d = new Date(ms);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatTime(ms) {
  const d = new Date(ms);
  let h = d.getHours(), m = d.getMinutes(), ampm = 'am';
  if (h >= 12) { ampm = 'pm'; if (h > 12) h -= 12; }
  if (h === 0) h = 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

function dayLabel(iso) {
  const today = todayISO();
  const d = new Date(iso + 'T00:00:00');
  const yest = new Date(d);
  const todayDate = new Date(today + 'T00:00:00');
  const diff = Math.round((todayDate - d) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'yesterday';
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}

// ── Google Auth & Drive Sync ─────────────────────────────────────────────
const GIS_CLIENT_ID = '708733339406-5clkirf9o0g9nk4lolmrdnrml6rledrf.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata email profile';
const DRIVE_FILE_NAME = 'notebook_data.json';

let accessToken = null;
let driveFileId = null;
let syncTimer = null;
let tokenClient = null;

// Persist token across page refreshes (sessionStorage survives Ctrl+R, cleared on tab close)
function saveTokenSession(token, expiresIn) {
  sessionStorage.setItem('nb_token', token);
  sessionStorage.setItem('nb_token_exp', String(Date.now() + Math.max(0, expiresIn - 60) * 1000));
}
function loadTokenSession() {
  const t = sessionStorage.getItem('nb_token');
  const exp = parseInt(sessionStorage.getItem('nb_token_exp') || '0');
  return (t && Date.now() < exp) ? t : null;
}
function clearTokenSession() {
  sessionStorage.removeItem('nb_token');
  sessionStorage.removeItem('nb_token_exp');
}

function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GIS_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: handleTokenResponse,
    error_callback: handleTokenError,
  });
  // Restore token from sessionStorage if still valid — no popup needed
  if (localStorage.getItem('nb_google_signin')) {
    const saved = loadTokenSession();
    if (saved) {
      accessToken = saved;
      loadFromDrive(); // silently sync Drive data with saved token
    }
  }
}

function handleTokenError() {
  // Popup blocked or closed — do nothing, localStorage data stays visible
}

async function handleTokenResponse(resp) {
  if (resp.error) return;
  accessToken = resp.access_token;
  saveTokenSession(resp.access_token, resp.expires_in || 3599);
  localStorage.setItem('nb_google_signin', '1');
  try {
    const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${accessToken}` }
    }).then(r => r.json());
    localStorage.setItem('nb_google_email', info.email || '');
    localStorage.setItem('nb_google_name', info.name || '');
    localStorage.setItem('nb_google_picture', info.picture || '');
    populateChip(info);
  } catch {}
  updateAuthUI(true);
  await loadFromDrive();
}

function populateChip(info) {
  const avatar = document.getElementById('user-avatar');
  const nameEl = document.getElementById('user-name');
  if (info.picture) {
    avatar.innerHTML = `<img src="${escHtml(info.picture)}" alt="" referrerpolicy="no-referrer">`;
  } else {
    avatar.textContent = (info.name || info.email || '')[0]?.toUpperCase() || '';
  }
  nameEl.textContent = (info.name || info.email || '').split(' ')[0];
  document.getElementById('signout-email').textContent = info.email || '';
}

function updateAuthUI(signedIn) {
  document.getElementById('btn-sign-in').classList.toggle('hidden', signedIn);
  document.getElementById('user-chip').classList.toggle('visible', signedIn);
  document.getElementById('btn-settings-signin').style.display = signedIn ? 'none' : '';
  document.getElementById('btn-modal-signout').style.display   = signedIn ? '' : 'none';
  if (!signedIn) {
    document.getElementById('user-avatar').innerHTML = '';
    document.getElementById('user-name').textContent = '';
  } else {
    const picture = localStorage.getItem('nb_google_picture') || '';
    const name    = localStorage.getItem('nb_google_name') || '';
    const email   = localStorage.getItem('nb_google_email') || document.getElementById('popout-email').textContent || '';
    populateChip({ picture, name, email });
  }
}

function setSyncStatus() {} // visual state via spinning button only

// Drive helpers
async function driveRequest(url, opts = {}) {
  const res = await fetch(url, {
    ...opts,
    headers: { Authorization: `Bearer ${accessToken}`, ...(opts.headers || {}) }
  });
  if (res.status === 401) {
    accessToken = null; // token expired — user can re-sync by clicking ↻
    throw new Error('token_expired');
  }
  return res;
}

async function driveFindFile() {
  const res = await driveRequest(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27${DRIVE_FILE_NAME}%27&fields=files(id)`
  );
  const data = await res.json();
  return data.files?.[0]?.id || null;
}

async function driveReadFile(fileId) {
  const res = await driveRequest(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`
  );
  return await res.json();
}

async function driveWriteFile(content) {
  const body = JSON.stringify(content);
  if (!driveFileId) {
    // Create new appDataFolder file via multipart upload
    const boundary = 'nb_mp_boundary';
    const meta = JSON.stringify({ name: DRIVE_FILE_NAME, parents: ['appDataFolder'] });
    const mp = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
    const res = await driveRequest(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      { method: 'POST', headers: { 'Content-Type': `multipart/related; boundary=${boundary}` }, body: mp }
    );
    const data = await res.json();
    driveFileId = data.id;
  } else {
    await driveRequest(
      `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,
      { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body }
    );
  }
}

async function loadFromDrive() {
  const syncBtn = document.getElementById('btn-sync');
  if (syncBtn) syncBtn.classList.add('spinning');
  try {
    driveFileId = await driveFindFile();
    if (driveFileId) {
      // Drive data wins — load it into state and localStorage
      const data = await driveReadFile(driveFileId);
      if (Array.isArray(data.wins))       { wins = data.wins;        saveWinsLocal(wins); }
      if (Array.isArray(data.habits))     { habits = data.habits;    saveHabitsLocal(habits); }
      if (Array.isArray(data.reminders))  { reminders = data.reminders; saveRemindersLocal(reminders); }
      if (Array.isArray(data.activities)) { activities = data.activities; saveActivitiesLocal(activities); }
      if (Array.isArray(data.planner))    { planner = data.planner;  savePlannerLocal(planner); }
      if (Array.isArray(data.smallTasks)) { smallTasks = data.smallTasks; saveSmallTasksLocal(smallTasks); }
      if (data.planSettings && typeof data.planSettings === 'object') {
        planSettings = { dayStart: 6, dayEnd: 24, recurring: [], ...data.planSettings };
        savePlanSettingsLocal();
      }
      renderWins(); renderHabits(); renderReminders(); renderBored(); renderActivityList(); renderPlanner(); renderSmallTasks();
    } else {
      // First sign-in: push existing local data up to Drive
      await driveWriteFile({ wins, habits, reminders, activities, planner, smallTasks, planSettings });
    }
  } catch (e) {
    if (e.message !== 'token_expired') console.error('[notebook] Drive sync error:', e);
  } finally {
    if (syncBtn) syncBtn.classList.remove('spinning');
  }
}

function scheduleDriveSync() {
  if (!accessToken) return;
  setSyncStatus('saving...');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    try {
      await driveWriteFile({ wins, habits, reminders, activities, planner, smallTasks, planSettings });
    } catch (e) {
      if (e.message !== 'token_expired') console.error('[notebook] Drive sync error:', e);
    }
  }, 1500);
}

// ── State ────────────────────────────────────────────────────────────────
// Data starts empty — only populated from Drive after sign-in
let wins = [];
let habits = [];
let reminders = [];
let activities = DEFAULT_ACTIVITIES.map(a => ({ ...a }));
let planner = [];
let smallTasks = [];
let planSettings = { dayStart: 6, dayEnd: 12, recurring: [] };

let winsLookback = parseInt(localStorage.getItem('nb_lookback') || '0'); // 0 = all time

// ── Wins feed ────────────────────────────────────────────────────────────
function renderWins() {
  const feed = document.getElementById('wins-feed');
  if (wins.length === 0) {
    feed.innerHTML = `<div class="empty-state">
      <span class="empty-glyph">✦</span>
      <span class="empty-text">no wins logged yet — start small</span>
    </div>`;
    return;
  }

  // Filter by look-back window
  const cutoff = winsLookback > 0 ? Date.now() - winsLookback * 86400000 : 0;
  const visible = cutoff ? wins.filter(w => w.ts >= cutoff) : wins;
  if (visible.length === 0) {
    feed.innerHTML = `<div class="empty-state">
      <span class="empty-glyph">✦</span>
      <span class="empty-text">no wins in the last ${winsLookback} days</span>
    </div>`;
    return;
  }

  // Group by ISO date
  const groups = {};
  visible.forEach(w => {
    const iso = isoFromEpoch(w.ts);
    if (!groups[iso]) groups[iso] = [];
    groups[iso].push(w);
  });

  // Sort dates newest first
  const dates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  feed.innerHTML = '';
  dates.forEach(iso => {
    const label = document.createElement('div');
    label.className = 'day-label';
    label.textContent = dayLabel(iso);
    feed.appendChild(label);

    // Sort wins newest first within day
    groups[iso].sort((a, b) => b.ts - a.ts).forEach(w => {
      const card = document.createElement('div');
      card.className = 'win-card';
      card.dataset.id = w.id;

      card.innerHTML = `
        <div class="win-pip"></div>
        <div class="win-body"><div class="win-note">${escHtml(w.note)}</div></div>
        <span class="win-time">${formatTime(w.ts)}</span>
        <button class="btn-delete" title="delete" data-id="${escHtml(w.id)}">×</button>
      `;
      feed.appendChild(card);
    });
  });

  // Delete buttons
  feed.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      wins = wins.filter(w => w.id !== id);
      saveWins(wins);
      renderWins();
    });
  });
}

// ── Log a win ────────────────────────────────────────────────────────────
function logWin() {
  const input = document.getElementById('win-input');
  const note = input.value.trim().toLowerCase();

  if (!note) {
    input.classList.add('flash-error');
    input.focus();
